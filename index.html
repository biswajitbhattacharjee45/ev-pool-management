    <style>
      @keyframes boltPulse {
        0%,100%{transform:scale(1);filter:drop-shadow(0 0 8px #3b82f6) drop-shadow(0 0 24px #3b82f6);}
        50%{transform:scale(1.18);filter:drop-shadow(0 0 20px #60a5fa) drop-shadow(0 0 48px #3b82f6);}
      }
      @keyframes progressFill {
        0%{width:0%;}
        20%{width:22%;}
        45%{width:48%;}
        70%{width:72%;}
        90%{width:88%;}
        100%{width:100%;}
      }
      @keyframes dotBlink {
        0%,80%,100%{opacity:0.2;}
        40%{opacity:1;}
      }
      #ev-loader-bolt { animation: boltPulse 1.4s ease-in-out infinite; }
      #ev-loader-bar-fill { animation: progressFill 4s cubic-bezier(0.4,0,0.2,1) forwards; }
      .ev-dot { display:inline-block; animation: dotBlink 1.4s infinite both; }
      .ev-dot:nth-child(2){animation-delay:0.2s;}
      .ev-dot:nth-child(3){animation-delay:0.4s;}
    </style>

};

  const cyk = currentYearKey();
  const thisMonthDates = [];
  const pastMonths = {}; // monthKey -> [dates]  (within current year, not this month)
  const oldYears   = {}; // yearKey  -> { monthKey -> [dates] }

  sortedDates.forEach(d => {
    const mk = getMonthKey(d);
    const yk = getYearKey(d);
    if (mk === cmk) {
      thisMonthDates.push(d);
    } else if (yk === cyk) {
      if (!pastMonths[mk]) pastMonths[mk] = [];
      pastMonths[mk].push(d);
    } else {
      if (!oldYears[yk]) oldYears[yk] = {};
      if (!oldYears[yk][mk]) oldYears[yk][mk] = [];
      oldYears[yk][mk].push(d);
    }
  });
  return { thisMonthDates, pastMonths, oldYears };
};

// ── MAIN APP ──────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState("dashboard");
  const [darkMode, setDarkMode] = useState(() => { try { return localStorage.getItem("ev_darkmode") === "1"; } catch { return false; } });
  const toggleDark = () => setDarkMode(d => { const n = !d; try { localStorage.setItem("ev_darkmode", n ? "1" : "0"); } catch {} return n; });
  const css = makeCss(darkMode);
  const T = makeG(darkMode);
  const [cars, setCars] = useState(INITIAL_CARS);
  const isSavingCars = React.useRef(false);
  const saveCars = async (data) => {
    isSavingCars.current = true;
    setCars(data);
    try { const db = window.__db; if (db) await db.collection("config").doc("cars").set({ list: data, _seeded: true }); } catch(e) {}
    setTimeout(() => { isSavingCars.current = false; }, 3000);
  };

  // ── Single source of truth for users ──
  // Start EMPTY — never show hardcoded list. Wait for Firebase.
  const [allUsers, setAllUsers] = useState([]);
  const [usersLoaded, setUsersLoaded] = useState(false);
  const saveAllUsers = async (list) => {
    setAllUsers(list);
    try {
      const db = window.__db;
      if (db) await db.collection("config").doc("users").set({ list, _seeded: true });
    } catch(e) {}
  };

  const [trips, setTrips] = useState([]);
  const [maintenance, setMaintenance] = useState([]);
  const [fuelLogs, setFuelLogs] = useState([]);
  const [liveLocations, setLiveLocations] = useState({});
  const [currentUser, setCurrentUser] = useState(null);
  const [loaded, setLoaded] = useState(false);
  const [passwords, setPasswords] = useState({});
  const [showChangePw, setShowChangePw] = useState(false);

  // Simple hash for password storage (not cryptographic, but adequate for this app)
  const hashPw = (pw) => btoa(encodeURIComponent(pw + "_evpool_salt"));

  const savePassword = async (pfId, plainPw) => {
    const hashed = hashPw(plainPw);
    const updated = { ...passwords, [pfId]: hashed };
    setPasswords(updated);
    try {
      const db = window.__db;
      if (db) await db.collection("config").doc("passwords").set(updated);
    } catch(e) {}
    return hashed;
  };

  const checkPassword = (pfId, plainPw) => {
    const stored = passwords[pfId];
    if (!stored) {
      // No password set yet — default is PF ID itself
      return plainPw === pfId;
    }
    return stored === hashPw(plainPw);
  };

  // Load from storage
  useEffect(() => {
    try { const u = localStorage.getItem("ev_session"); if (u) setCurrentUser(JSON.parse(u)); } catch {}
    setLoaded(true);

    const db = window.__db;
    if (!db) return;

    // Load users from Firebase (preserves isAssistant and other flags), fallback to hardcoded
    db.collection("config").doc("users").get({ source: 'server' }).then(snap => {
      if (snap.exists) {
        const d = snap.data();
        if (Array.isArray(d.list) && d.list.length > 0) {
          setAllUsers(d.list);
          // Refresh current session in case role changed (e.g. isAssistant was toggled)
          try {
            const sess = localStorage.getItem("ev_session");
            if (sess) {
              const parsed = JSON.parse(sess);
              const fresh = d.list.find(u => u.pfId === parsed.pfId);
              if (fresh) {
                const updated = { ...parsed, isAssistant: !!(fresh.isAssistant), isAdmin: ADMIN_PF_IDS.includes(fresh.pfId) };
                setCurrentUser(updated);
                localStorage.setItem("ev_session", JSON.stringify(updated));
              }
            }
          } catch(e) {}
        } else {
          setAllUsers([...AUTHORISED_USERS]);
        }
      } else {
        setAllUsers([...AUTHORISED_USERS]);
      }
      setUsersLoaded(true);
    }).catch(e => {
      setAllUsers([...AUTHORISED_USERS]);
      setUsersLoaded(true);
    });

    // Passwords: load once from server
    db.collection("config").doc("passwords").get({ source: 'server' }).then(snap => {
      if (snap.exists) setPasswords(snap.data() || {});
    }).catch(e => {});

    // Cars: load once from server
    db.collection("config").doc("cars").get({ source: 'server' }).then(snap => {
      if (snap.exists) {
        const d = snap.data();
        if (Array.isArray(d.list) && d.list.length > 0) setCars(d.list);
      }
    }).catch(e => {});


    const unsubs = [];
    try {
      // { includeMetadataChanges: false } — only fire on server-confirmed changes, not cache
      const snapOpts = { includeMetadataChanges: false };
      unsubs.push(db.collection("trips").onSnapshot(snapOpts, snap => {
        if (snap.metadata.fromCache) return; // ignore stale cache snapshots
        setTrips(snap.docs.map(d => ({ id: d.id, ...d.data() })));
      }));
      unsubs.push(db.collection("maintenance").onSnapshot(snapOpts, snap => {
        if (snap.metadata.fromCache) return;
        setMaintenance(snap.docs.map(d => ({ id: d.id, ...d.data() })));
      }));
      unsubs.push(db.collection("fuel").onSnapshot(snapOpts, snap => {
        if (snap.metadata.fromCache) return;
        setFuelLogs(snap.docs.map(d => ({ id: d.id, ...d.data() })));
      }));
      unsubs.push(db.collection("config").doc("live").onSnapshot(snapOpts, snap => {
        if (snap.metadata.fromCache) return;
        if (snap.exists) setLiveLocations(snap.data());
      }));
    } catch(e) { console.error("Firebase listener error:", e); }

    return () => unsubs.forEach(u => { try { u(); } catch {} });
  }, []);

  const _fsWrite = async (colName, data) => {
    const db = window.__db; if (!db) return;
    try {
      // Step 1: Write/update all current records (safe — no deletes yet)
      await Promise.all(data.map(t => db.collection(colName).doc(String(t.id)).set(t)));
      // Step 2: Delete only records that are no longer in the data array
      const snap = await db.collection(colName).get({ source: 'server' });
      const currentIds = new Set(data.map(t => String(t.id)));
      const toDelete = snap.docs.filter(d => !currentIds.has(d.id));
      if (toDelete.length > 0) {
        await Promise.all(toDelete.map(d => d.ref.delete()));
      }
    } catch(e) { console.error("_fsWrite error:", e); }
  };
  const saveTrips = async (data) => { setTrips(data); _fsWrite("trips", data); };
  const saveMaint = async (data) => { setMaintenance(data); _fsWrite("maintenance", data); };
  const saveFuel  = async (data) => { setFuelLogs(data); _fsWrite("fuel", data); };
  const saveLive  = async (data) => {
    setLiveLocations(data);
    try { const db = window.__db; if (db) await db.collection("config").doc("live").set(data); } catch(e){}
  };

  const handleLogin = async (user) => {
    setCurrentUser(user);
    try { localStorage.setItem("ev_session", JSON.stringify(user)); } catch {}
  };
  const handleLogout = async () => {
    setCurrentUser(null);
    try { localStorage.removeItem("ev_session"); } catch {}
    setTab("dashboard");
  };

  const activeTripForCar = (carId) => trips.find(t => t.carId === carId && !t.returnTime && t.approvalStatus === "approved");
  // Block vehicle as soon as any pending OR approved trip exists (first-come-first-serve)
  const isCarBusy = (carId) => trips.some(t => t.carId === carId && !t.returnTime && (t.approvalStatus === "approved" || t.approvalStatus === "pending"));

  if (!loaded || !usersLoaded) return null; // keep loader overlay visible while data fetches

  // Data ready — hide the loading overlay now
  if (typeof window.__hideLoader === "function") { window.__hideLoader(); window.__hideLoader = null; }

  if (!currentUser) return <LoginScreen onLogin={handleLogin} allUsers={allUsers} checkPassword={checkPassword} />;

  // Driver portal — separate minimal interface
  if (currentUser.role === "driver") return <DriverPortal driver={currentUser} trips={trips} saveTrips={saveTrips} onLogout={handleLogout} darkMode={darkMode} />;


  const props = { cars, trips, maintenance, fuelLogs, liveLocations, saveTrips, saveMaint, saveFuel, saveLive, saveCars, isCarBusy, activeTripForCar, currentUser, allUsers, saveAllUsers, savePassword, checkPassword, darkMode, T, css };

  const pendingCount = trips.filter(t => t.approvalStatus === "pending").length;

  const NAV_ITEMS = [
    { id: "dashboard", label: "Dashboard", icon: "📊" },
    { id: "book",      label: "Book Trip",  icon: "📤" },
    { id: "trips",     label: "Trip Log",   icon: "📋" },
    ...(currentUser.isAdmin || currentUser.isAssistant ? [
      { id: "tracking",    label: "Tracking",  icon: "🗺" },
      { id: "fuel",        label: "Charging",  icon: "⚡" },
      { id: "maintenance", label: "Maint.",    icon: "🔧" },
    ] : []),
    ...(currentUser.isAdmin ? [
      { id: "approvals",   label: pendingCount > 0 ? `Approve(${pendingCount})` : "Approvals", icon: "✅" },
      { id: "users",       label: "Users",     icon: "👥" },
    ] : []),
  ];

  return (
    <div style={css.app}>
      <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
      <style>{`
        @keyframes ctaBreathe { 0%,100%{box-shadow:0 0 14px rgba(59,130,246,0.5),0 4px 12px rgba(0,0,0,0.3);transform:scale(1)} 50%{box-shadow:0 0 38px rgba(59,130,246,1),0 0 65px rgba(59,130,246,0.5),0 4px 16px rgba(0,0,0,0.3);transform:scale(1.05)} }
        .ev-book-cta { animation: ctaBreathe 2.2s ease-in-out infinite !important; }
        .ev-book-cta:hover { animation: none !important; transform: translateY(-2px) scale(1.03) !important; box-shadow: 0 0 50px rgba(59,130,246,1), 0 6px 20px rgba(0,0,0,0.35) !important; }
        @media (max-width: 600px) {
          .desktop-nav { display: none !important; }
          .mobile-bottom-nav { display: flex !important; }
          .two-col { grid-template-columns: 1fr !important; }
          .scroll-table { overflow-x: auto; -webkit-overflow-scrolling: touch; }
          .hide-mobile { display: none !important; }
        }
        @media (min-width: 601px) {
          .mobile-bottom-nav { display: none !important; }
          .desktop-nav { display: flex !important; }
        }
        * { -webkit-tap-highlight-color: transparent; }
        input, select, button { font-family: inherit; }
      `}</style>

      {/* ── HEADER ── */}
      <header style={css.header}>
        <div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
            <div style={css.headerTitle}>⚡ Pool EV Management</div>
            <span style={{ padding: '2px 8px', borderRadius: 20, background: 'linear-gradient(135deg,#5b21b6,#7c3aed)', fontSize: 9, fontWeight: 800, color: '#fff', letterSpacing: '0.06em', whiteSpace: 'nowrap', border: 'none', boxShadow: '0 2px 6px rgba(124,58,237,0.4)' }}>ver 3.0</span>
          </div>
          <div style={css.headerSub}>Tata Nexon EV Fleet · {currentUser.name}{currentUser.designation ? `, ${currentUser.designation}` : ''}</div>
        </div>
        {/* Desktop nav */}
        <nav className="desktop-nav" style={{ display: "flex", gap: 2, flexWrap: "wrap" }}>
          {NAV_ITEMS.map(({ id, label, icon }) => (
            <button key={id} style={{ padding: "6px 12px", borderRadius: 6, border: "none", cursor: "pointer", fontSize: 12, fontWeight: tab === id ? 800 : 500, background: tab === id ? "rgba(168,85,247,0.3)" : "transparent", color: tab === id ? "#fff" : "rgba(210,180,255,0.5)", borderBottom: tab === id ? "2px solid #e9d5ff" : "2px solid transparent", fontFamily: "'DM Sans',sans-serif" }} onClick={() => setTab(id)}>{icon} {label}</button>
          ))}
        </nav>
        <div style={{ display: "flex", alignItems: "center", gap: 6, marginLeft: 8 }}>
          <div style={{ textAlign: "right" }} className="hide-mobile">
            <div style={{ fontSize: 11, fontWeight: 700, color: "#fff" }}>{currentUser.name}{currentUser.designation ? `, ${currentUser.designation}` : ''}</div>
            <div style={{ fontSize: 11, color: "rgba(220,195,255,0.95)", fontWeight: 600 }}>{currentUser.department || (currentUser.isAdmin ? "Admin" : "Staff")}</div>
          </div>
          {/* Dark / Light mode toggle */}
          <button onClick={toggleDark} title={darkMode ? "Switch to Light Mode" : "Switch to Dark Mode"} style={{ padding: "5px 8px", borderRadius: 6, border: "1.5px solid rgba(168,85,247,0.4)", background: "rgba(255,255,255,0.08)", color: "#fff", fontSize: 13, cursor: "pointer", lineHeight: 1, whiteSpace: "nowrap" }}>{darkMode ? "☀️" : "🌙"}</button>
          <button onClick={() => setShowChangePw(true)} style={{ padding: "5px 8px", borderRadius: 6, border: "1.5px solid rgba(168,85,247,0.4)", background: "rgba(255,255,255,0.08)", color: "#fff", fontSize: 11, cursor: "pointer", whiteSpace: "nowrap" }}>🔑</button>
          <button onClick={handleLogout} style={{ padding: "5px 8px", borderRadius: 6, border: "1.5px solid rgba(168,85,247,0.4)", background: "rgba(255,255,255,0.08)", color: "#fff", fontSize: 11, cursor: "pointer", whiteSpace: "nowrap" }}>⏻</button>
        </div>
      </header>

      {/* ── BODY ── */}
      <div style={css.body}>
        {tab === "dashboard"   && <Dashboard {...props} setTab={setTab} />}
        {tab === "book"        && <BookTrip {...props} setTab={setTab} />}
        {tab === "trips"       && <TripLog {...props} currentUser={currentUser} />}
        {tab === "tracking"    && (currentUser.isAdmin || currentUser.isAssistant) && <LiveTracking {...props} />}
        {tab === "fuel"        && (currentUser.isAdmin || currentUser.isAssistant) && <FuelLog {...props} />}
        {tab === "maintenance" && (currentUser.isAdmin || currentUser.isAssistant) && <Maintenance {...props} />}
        {tab === "approvals"   && currentUser.isAdmin && <Approvals {...props} cars={cars} isCarBusy={isCarBusy} />}
        {tab === "users"       && currentUser.isAdmin && <UserManagement {...props} cars={cars} saveCars={saveCars} />}
      </div>

      {/* ── MOBILE BOTTOM NAV ── */}
      <nav className="mobile-bottom-nav" style={css.bottomNav}>
        {NAV_ITEMS.map(({ id, label, icon }) => (
          <button key={id} style={css.bottomNavBtn(tab === id)} onClick={() => setTab(id)}>
            <span style={{ fontSize: 18 }}>{icon}</span>
            <span style={{ fontSize: 10, lineHeight: 1, fontWeight: 700 }}>{label}</span>
            {id === "approvals" && pendingCount > 0 && (
              <span style={{ position: "absolute", top: 4, background: T.danger, color: "#fff", borderRadius: 10, fontSize: 8, fontWeight: 800, padding: "1px 4px" }}>{pendingCount}</span>
            )}
          </button>
        ))}
      </nav>

      {/* ── CHANGE PASSWORD MODAL ── */}
      {showChangePw && (
        <ChangePasswordModal
          currentUser={currentUser}
          checkPassword={checkPassword}
          savePassword={savePassword}
          onClose={() => setShowChangePw(false)}
          darkMode={darkMode}
        />
      )}
    </div>
  );
}

// ── CHANGE PASSWORD MODAL ────────────────────────────────────
function ChangePasswordModal({ currentUser, checkPassword, savePassword, onClose, darkMode }) {
  const css = makeCss(darkMode);
  const T = makeG(darkMode);
  const [oldPw, setOldPw] = useState("");
  const [newPw, setNewPw] = useState("");
  const [confirmPw, setConfirmPw] = useState("");
  const [showOld, setShowOld] = useState(false);
  const [showNew, setShowNew] = useState(false);
  const [msg, setMsg] = useState("");
  const [msgType, setMsgType] = useState("error");
  const [saving, setSaving] = useState(false);

  const handleChange = async () => {
    setMsg("");
    if (!oldPw) { setMsg("Please enter your current password."); setMsgType("error"); return; }
    if (!checkPassword(currentUser.pfId, oldPw)) { setMsg("❌ Current password is incorrect."); setMsgType("error"); return; }
    if (newPw.length < 6) { setMsg("❌ New password must be at least 6 characters."); setMsgType("error"); return; }
    if (newPw !== confirmPw) { setMsg("❌ New passwords do not match."); setMsgType("error"); return; }
    setSaving(true);
    await savePassword(currentUser.pfId, newPw);
    setSaving(false);
    setMsg("✅ Password changed successfully!");
    setMsgType("success");
    setTimeout(() => onClose(), 1500);
  };

  return (
    <div style={css.modal} onClick={onClose}>
      <div style={{ ...css.modalBox, maxWidth: 420 }} onClick={e => e.stopPropagation()}>
        <div style={{ fontSize: 28, textAlign: "center", marginBottom: 6 }}>🔑</div>
        <div style={{ ...css.sectionTitle, textAlign: "center", marginBottom: 4 }}>Change Password</div>
        <div style={{ fontSize: 13, color: "#fff", fontWeight: 600, textAlign: "center", marginBottom: 20 }}>{currentUser.name}{currentUser.designation ? `, ${currentUser.designation}` : ''} · PF: {currentUser.pfId}</div>
        <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
          <div>
            <label style={css.label}>Current Password</label>
            <div style={{ position: "relative" }}>
              <input style={{ ...css.input, paddingRight: 40 }} type={showOld ? "text" : "password"} value={oldPw} onChange={e => setOldPw(e.target.value)} placeholder="Enter current password" autoFocus />
              <button onClick={() => setShowOld(v => !v)} style={{ position: "absolute", right: 10, top: "50%", transform: "translateY(-50%)", background: "none", border: "none", cursor: "pointer", fontSize: 15 }}>{showOld ? "🙈" : "👁️"}</button>
            </div>
            <div style={{ fontSize: 11, color: "rgba(220,195,255,0.85)", fontWeight: 600, marginTop: 3 }}>Default is your PF ID if you haven't changed it.</div>
          </div>
          <div>
            <label style={css.label}>New Password</label>
            <div style={{ position: "relative" }}>
              <input style={{ ...css.input, paddingRight: 40 }} type={showNew ? "text" : "password"} value={newPw} onChange={e => setNewPw(e.target.value)} placeholder="Min 6 characters" />
              <button onClick={() => setShowNew(v => !v)} style={{ position: "absolute", right: 10, top: "50%", transform: "translateY(-50%)", background: "none", border: "none", cursor: "pointer", fontSize: 15 }}>{showNew ? "🙈" : "👁️"}</button>
            </div>
          </div>
          <div>
            <label style={css.label}>Confirm New Password</label>
            <input style={{ ...css.input, border: confirmPw && newPw !== confirmPw ? `1.5px solid ${T.danger}` : undefined }} type="password" value={confirmPw} onChange={e => setConfirmPw(e.target.value)} placeholder="Re-enter new password" onKeyDown={e => e.key === "Enter" && handleChange()} />
          </div>
          {msg && (
            <div style={{ padding: "10px 14px", background: msgType === "success" ? (darkMode ? "#052e16" : "#f0fdf4") : (darkMode ? "#450a0a" : "#fef2f2"), border: `1px solid ${msgType === "success" ? "#bbf7d0" : "#fecaca"}`, borderRadius: 8, fontSize: 13, color: msgType === "success" ? T.success : T.danger }}>
              {msg}
            </div>
          )}
          <div style={{ display: "flex", gap: 10 }}>
            <button style={css.btn(T.info)} onClick={handleChange} disabled={saving}>{saving ? "Saving..." : "💾 Change Password"}</button>
            <button style={css.btn(T.muted, true)} onClick={onClose}>Cancel</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── LOGIN SCREEN ──────────────────────────────────────────────
function LoginScreen({ onLogin, allUsers, checkPassword }) {
  const [portal, setPortal] = useState(null);
  const [pfId, setPfId] = useState("");
  const [password, setPassword] = useState("");
  const [showPw, setShowPw] = useState(false);
  const [driverPhone, setDriverPhone] = useState("");
  const [driverName, setDriverName] = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);
  const [matched, setMatched] = useState(null);
  const [mounted, setMounted] = useState(false);
  const [clock, setClock] = useState(() => new Date());

  const getAllUsers = () => allUsers || AUTHORISED_USERS;

  useEffect(() => { setTimeout(() => setMounted(true), 80); }, []);
  useEffect(() => { const t = setInterval(() => setClock(new Date()), 1000); return () => clearInterval(t); }, []);

  useEffect(() => {
    if (pfId.length >= 5) {
      const found = getAllUsers().find(u => u.pfId === pfId.trim());
      setMatched(found || null);
    } else { setMatched(null); }
  }, [pfId, allUsers]);

  const handleStaffLogin = () => {
    setError("");
    const user = getAllUsers().find(u => u.pfId === pfId.trim());
    if (!user) { setError("❌ PF ID not found. You are not authorised to access this system."); return; }
    if (!password) { setError("❌ Please enter your password."); return; }
    if (!checkPassword(pfId.trim(), password)) { setError("❌ Incorrect password. Please try again."); return; }
    setLoading(true);
    setTimeout(() => {
      onLogin({ name: user.name, pfId: user.pfId, department: user.department || "", designation: user.designation || "", isAdmin: ADMIN_PF_IDS.includes(user.pfId), isAssistant: !!(user.isAssistant), role: "staff" });
      setLoading(false);
    }, 600);
  };

  const handleDriverLogin = () => {
    setError("");
    const phone = driverPhone.replace(/\D/g, "").slice(-10);
    const driver = DRIVERS.find(d => d.phone === phone && d.name.toLowerCase() === driverName.trim().toLowerCase());
    if (!driver) { setError("❌ Name or phone number does not match. Please check your details."); return; }
    setLoading(true);
    setTimeout(() => {
      onLogin({ name: driver.name, carId: driver.id, vehicle: driver.vehicle, plate: driver.plate, color: driver.color, phone: driver.phone, role: "driver" });

                <label style={S.label}>Your Name</label>

                  value={driverName} onChange={e => { setDriverName(e.target.value); setError(""); }}
                  placeholder="e.g. Alam" autoFocus />
              </div>
              <div style={{ marginBottom: 14 }}>
                <label style={S.label}>Registered Phone Number</label>
                <input className="ev-inp ev-inp-green" style={S.inp(error ? "rgba(239,68,68,0.5)" : "rgba(255,255,255,0.08)")}
                  value={driverPhone} onChange={e => { setDriverPhone(e.target.value); setError(""); }}
                  placeholder="e.g. 7637946383" maxLength={15} onKeyDown={e => e.key === "Enter" && handleDriverLogin()} />
              </div>

              {error && <div style={S.errCard}>{error}</div>}

              <button className="ev-submit" onClick={handleDriverLogin} disabled={loading || !driverPhone || !driverName}
                style={S.submitBtn(driverPhone && driverName, "#10b981")}>
                {loading ? (
                  <span style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}>
                    <span style={{ width: 14, height: 14, border: "2px solid rgba(255,255,255,0.3)", borderTopColor: "#fff", borderRadius: "50%", display: "inline-block", animation: "spin 0.7s linear infinite" }}></span>
                    Verifying...
                  </span>
                ) : "Enter Driver Portal →"}
              </button>
            </div>
          )}
        </div>

        <div style={S.footer}>Pool EV Management · {new Date().getFullYear()}</div>
        <div style={{ textAlign: "center", marginTop: 16, padding: "14px 24px", borderRadius: 14, background: "linear-gradient(160deg,#12002e,#1e0050,#2d0075,#3d0d90)", border: "1px solid rgba(140,80,255,0.4)", borderTop: "1px solid rgba(180,140,255,0.55)", boxShadow: "0 6px 24px rgba(20,0,60,0.35), inset 0 1px 0 rgba(180,120,255,0.2)" }}>
          <div style={{ fontSize: 9, color: "rgba(220,190,255,0.65)", letterSpacing: "0.18em", textTransform: "uppercase", marginBottom: 6, fontWeight: 700 }}>✦ Designed &amp; Developed by ✦</div>
          <div style={{ fontSize: 15, fontWeight: 800, background: "linear-gradient(90deg,#e9d5ff,#fff,#f0abfc)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent", letterSpacing: "0.03em" }}>Biswajit Bhattacharjee</div>
          <div style={{ fontSize: 10, color: "rgba(220,190,255,0.75)", marginTop: 5, letterSpacing: "0.06em", fontWeight: 600 }}>Chief Manager · Liaison · Guwahati</div>
        </div>
      </div>
    </div>
  );
}

// ── DRIVER PORTAL ─────────────────────────────────────────────
function DriverPortal({ driver, trips, saveTrips, onLogout, darkMode }) {
  const T = makeG(darkMode);
  const myTrips = trips.filter(t => t.carId === driver.carId).slice().reverse();
  const activeTrip = myTrips.find(t => !t.returnTime && t.approvalStatus === "approved");
  const pendingTrips = myTrips.filter(t => t.approvalStatus === "pending");
  const todayTrips = myTrips.filter(t => t.date === today());

  // Return update state
  const [showReturn, setShowReturn] = useState(false);
  const [returnForm, setReturnForm] = useState({ returnDate: today(), returnTime: now(), endKm: "", remarks: "" });
  const [returnMsg, setReturnMsg] = useState("");

  const handleDriverReturn = () => {
    if (!activeTrip) return;
    if (!returnForm.returnTime) { setReturnMsg("❌ Please enter return time."); return; }
    const returnDateTime = returnForm.returnDate + " " + returnForm.returnTime;
    const updated = trips.map(t => t.id === activeTrip.id
      ? { ...t, returnTime: returnDateTime, endKm: returnForm.endKm, remarks: returnForm.remarks }
      : t
    );
    saveTrips(updated);
    setReturnMsg("✅ Return recorded successfully!");
    setShowReturn(false);
    setReturnForm({ returnDate: today(), returnTime: now(), endKm: "", remarks: "" });
    setTimeout(() => setReturnMsg(""), 3000);
  };

  const statusColor = { approved: T.success, pending: T.warning, rejected: T.danger };
  const statusLabel = { approved: "✅ Approved — On Duty", pending: "⏳ Awaiting Approval", rejected: "❌ Rejected" };

  return (
    <div style={{ minHeight: "100vh", background: "#0f172a", fontFamily: "'DM Sans', sans-serif" }}>
      <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

      {/* Header */}
      <div style={{ background: driver.color, padding: "20px 24px", position: "relative", overflow: "hidden" }}>
        <div style={{ position: "absolute", inset: 0, background: "rgba(0,0,0,0.25)" }} />
        <div style={{ position: "relative", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <div>
            <div style={{ fontSize: 12, color: "rgba(255,255,255,0.7)", fontWeight: 600, letterSpacing: "0.08em", textTransform: "uppercase" }}>Driver Portal</div>
            <div style={{ fontSize: 24, fontWeight: 800, color: "#fff", marginTop: 2 }}>🧑‍✈️ {driver.name}</div>
            <div style={{ fontSize: 13, color: "rgba(255,255,255,0.8)", marginTop: 4 }}>
              {driver.vehicle} · {driver.plate}
            </div>
          </div>
          <button onClick={onLogout} style={{ padding: "8px 16px", borderRadius: 8, border: "1.5px solid rgba(255,255,255,0.4)", background: "transparent", color: "#fff", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>Logout</button>
        </div>
      </div>

      <div style={{ padding: 20, maxWidth: 600, margin: "0 auto" }}>

        {/* Current status card */}
        <div style={{ background: "#1e293b", borderRadius: 14, padding: 20, marginBottom: 16, border: `2px solid ${activeTrip ? T.success : "#334155"}` }}>
          <div style={{ fontSize: 12, fontWeight: 800, color: "rgba(210,190,255,0.9)", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 12 }}>Current Vehicle Status</div>
          {activeTrip ? (
            <div>
              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14 }}>
                <div style={{ width: 12, height: 12, borderRadius: "50%", background: "#22c55e", boxShadow: "0 0 0 3px rgba(34,197,94,0.3)", animation: "pulse 1.5s infinite" }} />
                <span style={{ fontSize: 16, fontWeight: 800, color: "#4ade80" }}>ON DUTY</span>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "10px 20px", fontSize: 14 }}>
                <div><div style={{ fontSize: 11, color: "rgba(200,180,255,0.85)", marginBottom: 2, fontWeight: 700 }}>OFFICER</div><div style={{ color: "#fff", fontWeight: 700 }}>{activeTrip.officerName}</div></div>
                <div><div style={{ fontSize: 11, color: "rgba(200,180,255,0.85)", marginBottom: 2, fontWeight: 700 }}>DEPARTMENT</div><div style={{ color: "#fff", fontWeight: 600 }}>{activeTrip.department}</div></div>
                <div><div style={{ fontSize: 11, color: "rgba(200,180,255,0.85)", marginBottom: 2, fontWeight: 700 }}>DESTINATION</div><div style={{ color: "#fff", fontWeight: 700 }}>{activeTrip.destination}</div></div>
                <div><div style={{ fontSize: 11, color: "rgba(200,180,255,0.85)", marginBottom: 2, fontWeight: 700 }}>PURPOSE</div><div style={{ color: "rgba(220,195,255,0.9)", fontWeight: 600 }}>{activeTrip.purpose || "—"}</div></div>
                <div><div style={{ fontSize: 11, color: "rgba(200,180,255,0.85)", marginBottom: 2, fontWeight: 700 }}>DEPARTURE</div><div style={{ color: "#fff" }}>{fmtDate(activeTrip.date)} at {activeTrip.departureTime}</div></div>
                <div><div style={{ fontSize: 11, color: "rgba(200,180,255,0.85)", marginBottom: 2, fontWeight: 700 }}>START KM</div><div style={{ color: "#fff" }}>{activeTrip.startKm || "—"}</div></div>
              </div>
            </div>
          ) : pendingTrips.length > 0 ? (
            <div style={{ textAlign: "center", padding: "20px 0" }}>
              <div style={{ fontSize: 32, marginBottom: 10 }}>⏳</div>
              <div style={{ fontSize: 16, fontWeight: 700, color: "#fbbf24" }}>Approval Pending</div>
              <div style={{ fontSize: 13, color: "rgba(200,180,255,0.9)", marginTop: 4, fontWeight: 600 }}>{pendingTrips.length} trip request(s) awaiting admin approval</div>
            </div>
          ) : (
            <div style={{ textAlign: "center", padding: "20px 0" }}>
              <div style={{ fontSize: 32, marginBottom: 10 }}>🅿️</div>
              <div style={{ fontSize: 16, fontWeight: 700, color: "#4ade80" }}>Vehicle Available</div>
              <div style={{ fontSize: 13, color: "rgba(200,180,255,0.9)", marginTop: 4, fontWeight: 600 }}>No active trips assigned to your vehicle</div>
            </div>
          )}
          <style>{`@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }`}</style>
        </div>

        {/* ── MARK RETURN — shown only when there's an active trip not yet returned ── */}
        {activeTrip && (
          <div style={{ background: "#1e293b", borderRadius: 14, padding: 20, marginBottom: 16, border: `2px solid ${showReturn ? "#f97316" : "#f59e0b"}` }}>
            {returnMsg && (
              <div style={{ padding: "10px 14px", borderRadius: 8, background: returnMsg.startsWith("✅") ? "#14532d" : "#7f1d1d", color: "#fff", marginBottom: 14, fontSize: 13, fontWeight: 600 }}>{returnMsg}</div>
            )}
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: showReturn ? 16 : 0 }}>
              <div>
                <div style={{ fontSize: 12, fontWeight: 700, color: "#f59e0b", textTransform: "uppercase", letterSpacing: "0.08em" }}>🔄 Mark Vehicle Return</div>
                <div style={{ fontSize: 12, color: "rgba(220,195,255,0.9)", marginTop: 4, fontWeight: 600 }}>{activeTrip.officerName} hasn't returned yet — record it here</div>
              </div>
              <button
                onClick={() => setShowReturn(s => !s)}
                style={{ padding: "8px 18px", borderRadius: 8, border: "none", background: showReturn ? "#475569" : "#f59e0b", color: "#fff", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>
                {showReturn ? "Cancel" : "Update Return"}
              </button>
            </div>
            {showReturn && (
              <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
                <div style={{ padding: "10px 14px", background: "rgba(255,255,255,0.06)", borderRadius: 8, fontSize: 13, color: "rgba(220,195,255,0.95)", fontWeight: 500 }}>
                  🚗 <b style={{ color: "#fff" }}>{activeTrip.carName}</b> · Officer: <b style={{ color: "#fff" }}>{activeTrip.officerName}</b> · To: {activeTrip.destination}
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                  <div>
                    <label style={{ fontSize: 11, fontWeight: 800, color: "rgba(210,190,255,0.9)", marginBottom: 4, display: "block", textTransform: "uppercase" }}>Return Date *</label>
                    <input type="date" value={returnForm.returnDate}
                      onChange={e => setReturnForm(f => ({ ...f, returnDate: e.target.value }))}
                      style={{ width: "100%", padding: "10px 12px", borderRadius: 7, border: "1.5px solid #334155", fontSize: 14, background: "#0f172a", color: "#fff", boxSizing: "border-box" }} />
                  </div>
                  <div>
                    <label style={{ fontSize: 11, fontWeight: 800, color: "rgba(210,190,255,0.9)", marginBottom: 4, display: "block", textTransform: "uppercase" }}>Return Time *</label>
                    <input type="time" value={returnForm.returnTime}
                      onChange={e => setReturnForm(f => ({ ...f, returnTime: e.target.value }))}
                      style={{ width: "100%", padding: "10px 12px", borderRadius: 7, border: "1.5px solid #334155", fontSize: 14, background: "#0f172a", color: "#fff", boxSizing: "border-box" }} />
                  </div>
                </div>
                <div>
                  <label style={{ fontSize: 11, fontWeight: 800, color: "rgba(210,190,255,0.9)", marginBottom: 4, display: "block", textTransform: "uppercase" }}>End Odometer (km)</label>
                  <input type="number" value={returnForm.endKm}
                    onChange={e => setReturnForm(f => ({ ...f, endKm: e.target.value }))}
                    placeholder="e.g. 45310"
                    style={{ width: "100%", padding: "10px 12px", borderRadius: 7, border: "1.5px solid #334155", fontSize: 14, background: "#0f172a", color: "#fff", boxSizing: "border-box" }} />
                </div>
                <div>
                  <label style={{ fontSize: 11, fontWeight: 800, color: "rgba(210,190,255,0.9)", marginBottom: 4, display: "block", textTransform: "uppercase" }}>Remarks (optional)</label>
                  <input value={returnForm.remarks}
                    onChange={e => setReturnForm(f => ({ ...f, remarks: e.target.value }))}
                    placeholder="Any notes about the trip..."
                    style={{ width: "100%", padding: "10px 12px", borderRadius: 7, border: "1.5px solid #334155", fontSize: 14, background: "#0f172a", color: "#fff", boxSizing: "border-box" }} />
                </div>
                <button onClick={handleDriverReturn}
                  style={{ padding: "12px", borderRadius: 8, border: "none", background: "#f59e0b", color: "#000", fontWeight: 800, fontSize: 14, cursor: "pointer" }}>
                  ✅ Confirm Vehicle Returned
                </button>
              </div>
            )}
          </div>
        )}

        {/* Today's trips */}
        <div style={{ background: "#1e293b", borderRadius: 14, padding: 20, marginBottom: 16, border: "1px solid #334155" }}>
          <div style={{ fontSize: 12, fontWeight: 800, color: "rgba(210,190,255,0.9)", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 14 }}>
            Today's Schedule — {new Date().toLocaleDateString("en-IN", { weekday: "long", day: "numeric", month: "long" })}
          </div>
          {todayTrips.length === 0 ? (
            <div style={{ fontSize: 13, color: "rgba(200,180,255,0.9)", textAlign: "center", padding: "12px 0", fontWeight: 600 }}>No trips scheduled for today</div>
          ) : todayTrips.map(t => (
            <div key={t.id} style={{ padding: "14px", background: "rgba(255,255,255,0.07)", borderRadius: 10, marginBottom: 10, borderLeft: `3px solid ${statusColor[t.approvalStatus] || T.muted}` }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 8 }}>
                <div style={{ fontWeight: 700, color: "#fff", fontSize: 14 }}>{t.officerName}</div>
                <span style={{ fontSize: 11, fontWeight: 700, padding: "2px 8px", borderRadius: 12, background: (statusColor[t.approvalStatus] || T.muted) + "25", color: statusColor[t.approvalStatus] || T.muted }}>
                  {statusLabel[t.approvalStatus] || t.approvalStatus}
                </span>
              </div>
              <div style={{ fontSize: 12, color: "rgba(200,180,255,0.9)", fontWeight: 600, display: "grid", gridTemplateColumns: "1fr 1fr", gap: "4px 12px" }}>
                <div>📍 {t.destination}</div>
                <div>🕐 {t.departureTime}</div>
                <div>🏢 {t.department}</div>
                <div>📝 {t.purpose || "—"}</div>
              </div>
              {t.returnTime && <div style={{ marginTop: 8, fontSize: 12, color: "#4ade80" }}>✅ Returned at {t.returnTime} {t.endKm ? `· End KM: ${t.endKm}` : ""}</div>}
            </div>
          ))}
        </div>

        {/* Recent trip history */}
        <div style={{ background: "#1e293b", borderRadius: 14, padding: 20, border: "1px solid #334155" }}>
          <div style={{ fontSize: 12, fontWeight: 800, color: "rgba(210,190,255,0.9)", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 14 }}>Recent Trip History</div>
          {myTrips.length === 0 ? (
            <div style={{ fontSize: 13, color: "rgba(200,180,255,0.9)", textAlign: "center", padding: "12px 0", fontWeight: 600 }}>No trips recorded yet</div>
          ) : myTrips.slice(0, 10).map(t => (
            <div key={t.id} style={{ display: "flex", gap: 12, padding: "10px 0", borderBottom: "1px solid #0f172a", alignItems: "flex-start" }}>
              <div style={{ width: 8, height: 8, borderRadius: "50%", background: statusColor[t.approvalStatus] || "rgba(200,175,255,0.7)", marginTop: 5, flexShrink: 0 }} />
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: "#fff" }}>{t.officerName} → {t.destination}</div>
                <div style={{ fontSize: 12, color: "rgba(200,180,255,0.85)", fontWeight: 600 }}>{fmtDate(t.date)} · {t.department} · {t.departureTime}{t.returnTime ? ` – ${t.returnTime}` : ""}</div>
                {t.startKm && t.endKm && <div style={{ fontSize: 11, color: "rgba(200,180,255,0.85)", fontWeight: 600 }}>Distance: {parseInt(t.endKm) - parseInt(t.startKm)} km</div>}
              </div>
              <span style={{ fontSize: 10, fontWeight: 700, padding: "2px 7px", borderRadius: 10, background: (statusColor[t.approvalStatus] || T.muted) + "20", color: statusColor[t.approvalStatus] || T.muted, flexShrink: 0 }}>
                {t.approvalStatus?.toUpperCase()}
              </span>
            </div>
          ))}
        </div>

      </div>
    </div>
  );
}

// ── DASHBOARD ─────────────────────────────────────────────────
function Dashboard({ cars, trips, maintenance, fuelLogs, liveLocations, isCarBusy, activeTripForCar, currentUser, setTab, darkMode, T, css }) {
  const [view, setView] = useState("pf"); // "pf" | "driver"
  const [search, setSearch] = useState("");
  const [expandedDates, setExpandedDates] = useState({ [today()]: true }); // today expanded by default
  const [expandedMonths, setExpandedMonths] = useState({});
  const [expandedYears, setExpandedYears] = useState({});
  const [showOlderDash, setShowOlderDash] = useState(false);
  const toggleDate  = (d)  => setExpandedDates(prev  => ({ ...prev,  [d]:  !prev[d] }));
  const toggleMonth = (mk) => setExpandedMonths(prev => ({ ...prev, [mk]: !prev[mk] }));
  const toggleYear  = (yk) => setExpandedYears(prev  => ({ ...prev,  [yk]: !prev[yk] }));

  const activeTrips   = trips.filter(t => !t.returnTime && t.approvalStatus === "approved");
  const pendingTrips  = trips.filter(t => t.approvalStatus === "pending");
  const todayTrips    = trips.filter(t => t.date === today());
  const pendingMaint  = maintenance.filter(m => m.status === "Pending").length;

  // ── PF-wise: group all trips by officerPfId / bookedByPfId
  const pfMap = {};
  trips.forEach(t => {
    const key = t.officerPfId || t.bookedByPfId || "unknown";
    if (!pfMap[key]) pfMap[key] = { pfId: key, name: t.officerName, department: t.department, trips: [] };
    pfMap[key].trips.push(t);
  });
  const pfRows = Object.values(pfMap).sort((a, b) => b.trips.length - a.trips.length);

  // ── Driver-wise: group all trips by carId
  const driverMap = {};
  cars.forEach(car => { driverMap[car.id] = { car, trips: [] }; });
  trips.forEach(t => { if (driverMap[t.carId]) driverMap[t.carId].trips.push(t); });
  const driverRows = Object.values(driverMap);

  const filteredPf = pfRows.filter(r =>
    !search || r.name?.toLowerCase().includes(search.toLowerCase()) || r.pfId.includes(search) || r.department?.toLowerCase().includes(search.toLowerCase())
  );
  const filteredDriver = driverRows.filter(r =>
    !search || r.car.driver.toLowerCase().includes(search.toLowerCase()) || r.car.plate.toLowerCase().includes(search.toLowerCase())
  );

  const statusBadge = (t) => {
    if (t.returnTime) return <span style={css.badge(T.success)}>Returned</span>;
    if (t.approvalStatus === "pending") return <span style={css.badge(T.warning)}>Pending</span>;
    if (t.approvalStatus === "rejected") return <span style={css.badge(T.danger)}>Rejected</span>;
    return <span style={css.badge("#0891b2")}>Active</span>;
  };

  return (
    <div>
      {/* ── Stat cards ── */}
      <div style={css.grid4}>
        {[
          { label: "EVs Available",    val: cars.length - activeTrips.length, color: T.success,  icon: "✅", tab: "dashboard", hint: "View vehicle status ↓" },
          { label: "Active Trips",     val: activeTrips.length,               color: "#0891b2",  icon: "🚗", tab: "trips",     hint: "View Trip Log →" },
          { label: "Pending Approvals",val: pendingTrips.length,              color: T.warning,  icon: "⏳", tab: "approvals", hint: "Go to Approvals →" },
          { label: "Today's Trips",    val: todayTrips.length,                color: T.info,     icon: "📋", tab: "trips",     hint: "View Trip Log →" },
        ].map(s => (
          <div key={s.label}
            onClick={() => s.tab && setTab && setTab(s.tab)}
            style={{ ...css.card, borderTop: `3px solid ${s.color}`, cursor: s.tab ? "pointer" : "default", transition: "all 0.15s", position: "relative" }}
            onMouseEnter={e => { if(s.tab) e.currentTarget.style.transform = "translateY(-2px)"; e.currentTarget.style.boxShadow = `0 6px 20px ${s.color}30`; }}
            onMouseLeave={e => { e.currentTarget.style.transform = ""; e.currentTarget.style.boxShadow = ""; }}>
            <div style={{ fontSize: 22, marginBottom: 6 }}>{s.icon}</div>
            <div style={{ ...css.statNum, color: s.color }}>{s.val}</div>
            <div style={css.statLabel}>{s.label}</div>
            {currentUser?.isAdmin && s.tab && (
              <div style={{ fontSize: 10, color: s.color, marginTop: 6, fontWeight: 600, opacity: 0.8 }}>{s.hint}</div>
            )}
          </div>
        ))}
      </div>

      {/* ── View toggle + search — admin only ── */}
      {currentUser.isAdmin && (
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 16, flexWrap: "wrap", gap: 10 }}>
          <div style={{ display: "flex", background: "#e2e8f0", borderRadius: 8, padding: 3, gap: 2 }}>
            {[["pf","👤 PF ID Wise"],["driver","🧑‍✈️ Driver Wise"]].map(([v, label]) => (
              <button key={v} onClick={() => { setView(v); setSearch(""); }}
                style={{ padding: "7px 20px", borderRadius: 6, border: "none", cursor: "pointer", fontWeight: 700, fontSize: 13,
                  background: view === v ? "#1e293b" : "transparent", color: view === v ? "#fff" : "rgba(200,175,255,0.8)", fontWeight: 700, transition: "all 0.15s" }}>
                {label}
              </button>
            ))}
          </div>
          <input
            style={{ ...css.input, maxWidth: 260 }}
            placeholder={view === "pf" ? "Search by name, PF ID or dept…" : "Search by driver or plate…"}
            value={search} onChange={e => setSearch(e.target.value)}
          />
        </div>
      )}

      {/* ══ ADMIN ONLY VIEWS ══ */}
      {!currentUser.isAdmin && (
        <div>
        {/* ── Book a Vehicle CTA banner ── */}
        <div style={{ marginBottom: 16, borderRadius: 14, background: "linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%)", border: "1.5px solid rgba(59,130,246,0.45)", padding: "22px 24px", display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 16, boxShadow: "0 4px 24px rgba(59,130,246,0.12)" }}>
          <div>
            <div style={{ fontSize: 17, fontWeight: 800, color: "#f1f5f9", marginBottom: 4 }}>🚗 Need a Pool Vehicle?</div>
            <div style={{ fontSize: 13, color: "rgba(220,195,255,0.9)", fontWeight: 600 }}>Book your trip in a few clicks — select vehicle, destination & time.</div>
          </div>
          <button
            className="ev-book-cta"
            onClick={() => setTab("book")}
            style={{ padding: "12px 28px", borderRadius: 10, border: "none", background: "linear-gradient(135deg, #3b82f6, #2563eb)", color: "#fff", fontWeight: 800, fontSize: 14, cursor: "pointer", letterSpacing: "0.02em", whiteSpace: "nowrap", transition: "box-shadow 0.2s, transform 0.2s" }}
          >⚡ Book a Vehicle Now →</button>
        </div>
        {/* ── Vehicle availability card ── */}
        <div style={{ ...css.card, textAlign: "center", padding: 40 }}>
          <div style={{ fontSize: 40, marginBottom: 12 }}>🚗</div>
          <div style={{ fontSize: 18, fontWeight: 700, color: T.textCard, marginBottom: 8 }}>
            {cars.length - activeTrips.length} of {cars.length} vehicles available
          </div>
          <div style={{ fontSize: 13, color: T.mutedCard, marginBottom: 20, fontWeight: 600 }}>
            {activeTrips.length > 0 ? `${activeTrips.length} vehicle${activeTrips.length > 1 ? "s" : ""} currently on duty` : "All vehicles are available for booking"}
          </div>
          <div style={{ display: "flex", justifyContent: "center", gap: 12, flexWrap: "wrap" }}>
            {cars.map(car => {
              const busy = isCarBusy(car.id);
              return (
                <div key={car.id} style={{ padding: "12px 20px", borderRadius: 10, border: `2px solid ${busy ? T.danger : T.success}`, background: busy ? (darkMode ? "#450a0a" : "#fef2f2") : (darkMode ? "#052e16" : "#f0fdf4"), minWidth: 140 }}>
                  <div style={{ fontSize: 20, marginBottom: 4 }}>🚙</div>
                  <div style={{ fontWeight: 700, fontSize: 13, color: T.textCard }}>{car.name}</div>
                  <div style={{ fontSize: 11, color: T.subCard, fontWeight: 600 }}>{car.plate}</div>
                  <div style={{ marginTop: 6 }}>
                    {(() => {
                    const isPending = busy && trips.some(t => t.carId === car.id && !t.returnTime && t.approvalStatus === "pending");
                    return <span style={css.badge(isPending ? T.warning : busy ? T.danger : T.success)}>{isPending ? "● Pending" : busy ? "● On Duty" : "● Available"}</span>;
                  })()}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
        </div>
      )}

      {currentUser.isAdmin && view === "pf" && (() => {
        // Group all matching trips by date, sorted newest first
        const allTrips = filteredPf.flatMap(r => r.trips);
        const dateMap = {};
        allTrips.forEach(t => {
          const d = t.date || "unknown";
          if (!dateMap[d]) dateMap[d] = [];
          dateMap[d].push(t);
        });
        const sortedDates = Object.keys(dateMap).sort((a, b) => b.localeCompare(a));
        if (sortedDates.length === 0) return (
          <div style={css.card}>
            <div style={{ textAlign: "center", padding: 40, color: T.mutedCard, fontWeight: 600 }}>No trips recorded yet{search ? ` for "${search}"` : ""}.</div>
          </div>
        );

        const { thisMonthDates: dmThis, pastMonths: dmPast, oldYears: dmOld } = groupDatesByMonthYear(sortedDates);
        const dmOldYearKeys = Object.keys(dmOld).sort((a,b) => b.localeCompare(a));

        const renderDashDateBlock = (date) => {
          const dayTrips = dateMap[date];
          const isToday = date === today();
          const isOpen = expandedDates[date] !== false && (expandedDates[date] === true || isToday);
          const activeCount = dayTrips.filter(t => !t.returnTime && t.approvalStatus === "approved").length;
          const pendingCount2 = dayTrips.filter(t => t.approvalStatus === "pending").length;
          return (
            <div key={date} style={{ marginBottom: 8, borderRadius: 10, border: `1px solid ${isToday ? T.info : T.border}`, overflow: "hidden" }}>
              <div onClick={() => toggleDate(date)}
                style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 16px", background: isToday ? (darkMode ? "#0c1e3c" : "#eff6ff") : (darkMode ? "#1e1040" : "#ede8ff"), cursor: "pointer", userSelect: "none", borderBottom: isOpen ? `1px solid ${T.border}` : "none" }}>
                <span style={{ fontSize: 16 }}>{isOpen ? "▾" : "▸"}</span>
                <div style={{ flex: 1 }}>
                  <span style={{ fontWeight: 800, fontSize: 14, color: isToday ? T.info : T.textCard }}>
                    {isToday ? "📅 Today — " : "📅 "}{fmtDate(date)}
                  </span>
                  {isToday && <span style={{ marginLeft: 8, fontSize: 11, background: T.info, color: "#fff", padding: "1px 8px", borderRadius: 10, fontWeight: 700 }}>TODAY</span>}
                </div>
                <div style={{ display: "flex", gap: 14, fontSize: 12 }}>
                  <span style={{ color: T.mutedCard, fontWeight: 600 }}><b style={{ color: T.textCard }}>{dayTrips.length}</b> trips</span>
                  {activeCount > 0 && <span style={{ color: T.success, fontWeight: 700 }}>● {activeCount} active</span>}
                  {pendingCount2 > 0 && <span style={{ color: T.warning, fontWeight: 700 }}>⏳ {pendingCount2} pending</span>}
                </div>
              </div>
              {isOpen && (
                <div className="scroll-table"><table style={css.table}>
                  <thead><tr>
                    {["#","Officer","PF ID","Vehicle","Driver","Destination","Purpose","Depart","Return","Start KM","End KM","Dist","Status"].map(h => <th key={h} style={css.th}>{h}</th>)}
                  </tr></thead>
                  <tbody>
                    {dayTrips.map((t, i) => (
                      <tr key={t.id} style={{ background: !t.returnTime && t.approvalStatus === "approved" ? (darkMode ? "#052e16" : "#f0fdf4") : "transparent" }}>
                        <td style={{ ...css.td, color: "#6b21a8", fontSize: 11, fontWeight: 600 }}>{i + 1}</td>
                        <td style={{ ...css.td, fontWeight: 700 }}>{t.officerName}</td>
                        <td style={{ ...css.td, fontSize: 12, color: "#4c1d95", fontWeight: 600 }}>{t.officerPfId || t.bookedByPfId || "—"}</td>
                        <td style={css.td}><div style={{ fontWeight: 600 }}>{t.carName}</div><div style={{ fontSize: 11, color: "#7c3aed", fontWeight: 600 }}>{t.carPlate}</div></td>
                        <td style={css.td}>{t.driver}</td>
                        <td style={css.td}>{t.destination}</td>
                        <td style={{ ...css.td, color: "#4c1d95", fontSize: 12, fontWeight: 600 }}>{t.purpose || "—"}</td>
                        <td style={{ ...css.td, color: "#2563eb", fontWeight: 600 }}>{t.departureTime}</td>
                        <td style={{ ...css.td, color: "#16a34a", fontWeight: 600 }}>{t.returnTime ? t.returnTime.split(" ")[1] || t.returnTime : <span style={{ color: "#94a3b8" }}>—</span>}</td>
                        <td style={{ ...css.td, textAlign: "right" }}>{t.startKm || "—"}</td>
                        <td style={{ ...css.td, textAlign: "right" }}>{t.endKm || "—"}</td>
                        <td style={{ ...css.td, textAlign: "right", fontWeight: 600 }}>{t.startKm && t.endKm ? `${parseInt(t.endKm) - parseInt(t.startKm)} km` : "—"}</td>
                        <td style={css.td}>{statusBadge(t)}</td>
                      </tr>
                    ))}
                  </tbody>
                </table></div>
              )}
            </div>
          );
        };

        const renderDashMonthAccordion = (mk, dates) => {
          const isOpen = !!expandedMonths[mk];
          const totalTrips = dates.reduce((s, d) => s + (dateMap[d]?.length || 0), 0);
          return (
            <div key={mk} style={{ marginBottom: 8, borderRadius: 10, border: `1px solid ${T.border}`, overflow: "hidden" }}>
              <div onClick={() => toggleMonth(mk)}
                style={{ display: "flex", alignItems: "center", gap: 10, padding: "11px 16px", background: darkMode ? "#1a2540" : "#ede8ff", cursor: "pointer", userSelect: "none" }}>
                <span style={{ fontSize: 14 }}>{isOpen ? "▾" : "▸"}</span>
                <span style={{ fontSize: 13, fontWeight: 800, color: T.textCard }}>📅 {fmtMonthKey(mk)}</span>
                <span style={{ marginLeft: "auto", fontSize: 12, color: T.mutedCard }}>{dates.length} day{dates.length !== 1 ? "s" : ""} · {totalTrips} trip{totalTrips !== 1 ? "s" : ""}</span>
              </div>
              {isOpen && (
                <div style={{ padding: "8px 10px", borderTop: `1px solid ${T.border}` }}>
                  {dates.map(d => renderDashDateBlock(d))}
                </div>
              )}
            </div>
          );
        };

        return (
          <div>
            {/* Current month */}
            {dmThis.length > 0 && (
              <div style={{ marginBottom: 16 }}>
                <div style={{ fontSize: 11, fontWeight: 800, color: T.info, letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 8, paddingLeft: 4 }}>
                  📅 {fmtMonthKey(currentMonthKey())} — This Month
                </div>
                {dmThis.map(d => renderDashDateBlock(d))}
              </div>
            )}

            {/* Past months this year */}
            {Object.keys(dmPast).sort((a,b) => b.localeCompare(a)).length > 0 && (
              <div style={{ marginBottom: 16 }}>
                <div style={{ fontSize: 11, fontWeight: 800, color: T.mutedCard, letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 8, paddingLeft: 4 }}>
                  Earlier This Year — Click to Expand
                </div>
                {Object.keys(dmPast).sort((a,b) => b.localeCompare(a)).map(mk => renderDashMonthAccordion(mk, dmPast[mk]))}
              </div>
            )}

            {/* Older years */}
            {dmOldYearKeys.length > 0 && (
              <div style={{ marginBottom: 8 }}>
                {!showOlderDash
                  ? <button onClick={() => setShowOlderDash(true)}
                      style={{ width: "100%", padding: "12px", borderRadius: 10, border: `1.5px dashed ${T.lightBorder}`, background: "transparent", color: T.mutedCard, fontWeight: 700, fontSize: 13, cursor: "pointer" }}>
                      🗂 View Older Records ({dmOldYearKeys.join(", ")})
                    </button>
                  : dmOldYearKeys.map(yk => {
                      const isYearOpen = !!expandedYears[yk];
                      const monthKeys = Object.keys(dmOld[yk]).sort((a,b) => b.localeCompare(a));
                      const totalTrips = monthKeys.reduce((s, mk) => s + dmOld[yk][mk].reduce((ss, d) => ss + (dateMap[d]?.length || 0), 0), 0);
                      return (
                        <div key={yk} style={{ marginBottom: 10, borderRadius: 10, border: `1.5px solid ${T.border}`, overflow: "hidden" }}>
                          <div onClick={() => toggleYear(yk)}
                            style={{ display: "flex", alignItems: "center", gap: 10, padding: "12px 16px", background: darkMode ? "#1a2540" : "#e0d8ff", cursor: "pointer", userSelect: "none" }}>
                            <span style={{ fontSize: 16 }}>{isYearOpen ? "▾" : "▸"}</span>
                            <span style={{ fontSize: 14, fontWeight: 800, color: T.textCard }}>🗂 {yk}</span>
                            <span style={{ marginLeft: "auto", fontSize: 12, color: T.mutedCard }}>{monthKeys.length} month{monthKeys.length !== 1 ? "s" : ""} · {totalTrips} trips</span>
                          </div>
                          {isYearOpen && (
                            <div style={{ padding: "10px 12px", borderTop: `1px solid ${T.border}` }}>
                              {monthKeys.map(mk => renderDashMonthAccordion(mk, dmOld[yk][mk]))}
                            </div>
                          )}
                        </div>
                      );
                    })
                }
              </div>
            )}
          </div>
        );
      })()}

      {currentUser.isAdmin && view === "driver" && (
        <div style={css.card}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
            <div style={css.sectionTitle}>Trip Entries — Driver Wise</div>
            <div style={{ fontSize: 12, color: T.mutedCard, fontWeight: 600 }}>{cars.length} vehicles · {trips.length} total entries</div>
          </div>
          {filteredDriver.map(({ car, trips: carTrips }) => {
            const dateMap2 = {};
            carTrips.forEach(t => { const d = t.date || "unknown"; if (!dateMap2[d]) dateMap2[d] = []; dateMap2[d].push(t); });
            const sortedDates2 = Object.keys(dateMap2).sort((a, b) => b.localeCompare(a));
            const busy = isCarBusy(car.id);
            const active = activeTripForCar(car.id);
            const completed = carTrips.filter(t => t.returnTime).length;
            const totalKm = carTrips.reduce((s, t) => s + (t.startKm && t.endKm ? parseInt(t.endKm) - parseInt(t.startKm) : 0), 0);
            return (
              <div key={car.id} style={{ marginBottom: 24, borderRadius: 10, border: `2px solid ${busy ? T.danger : T.border}`, overflow: "hidden" }}>
                {/* Driver header */}
                <div style={{ display: "flex", alignItems: "center", gap: 14, padding: "14px 16px", background: busy ? (darkMode ? "#450a0a" : "#fff1f2") : T.light, borderBottom: `1px solid ${T.border}` }}>
                  <div style={{ width: 44, height: 44, borderRadius: "50%", background: car.color, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800, color: "#fff", fontSize: 18, flexShrink: 0 }}>
                    {car.driver.charAt(0)}
                  </div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontWeight: 800, fontSize: 15, color: T.textCard }}>🧑‍✈️ {car.driver}</div>
                    <div style={{ fontSize: 12, color: T.subCard, fontWeight: 600 }}>{car.name} · <b>{car.plate}</b> · {car.model}</div>
                    <div style={{ fontSize: 12, color: T.subCard, fontWeight: 600 }}>📞 <a href={`tel:${car.driverPhone}`} style={{ color: T.info, textDecoration: "none" }}>{car.driverPhone}</a></div>
                  </div>
                  <div style={{ display: "flex", gap: 16, fontSize: 12, textAlign: "center" }}>
                    <div><div style={{ fontWeight: 800, fontSize: 20, color: T.textCard }}>{carTrips.length}</div><div style={{ color: T.mutedCard }}>Trips</div></div>
                    <div><div style={{ fontWeight: 800, fontSize: 20, color: T.successCard }}>{completed}</div><div style={{ color: T.mutedCard }}>Done</div></div>
                    {totalKm > 0 && <div><div style={{ fontWeight: 800, fontSize: 20, color: T.mutedCard }}>{totalKm}</div><div style={{ color: T.mutedCard }}>km</div></div>}
                    <span style={{ ...css.badge(busy ? T.danger : T.success), alignSelf: "center", fontSize: 12 }}>{busy ? "● On Duty" : "● Available"}</span>
                  </div>
                </div>

                {/* Active trip highlight */}
                {active && (
                  <div style={{ padding: "10px 16px", background: darkMode ? "#052e16" : "#f0fdf4", borderBottom: `1px solid #bbf7d0`, display: "flex", gap: 20, flexWrap: "wrap", fontSize: 13 }}>
                    <div>🚦 <b>Currently with:</b> {active.officerName}</div>
                    <div>📍 <b>To:</b> {active.destination}</div>
                    <div>🏢 {active.department}</div>
                    <div>🕐 Since {active.departureTime}</div>
                    {active.startKm && <div>📏 Start KM: {active.startKm}</div>}
                  </div>
                )}

                {carTrips.length === 0
                  ? <div style={{ padding: "20px 16px", color: T.mutedCard, fontSize: 13 }}>No trips recorded for this vehicle yet.</div>
                  : sortedDates2.map(date => {
                    const dayT = dateMap2[date];
                    const isTodayD = date === today();
                    const isOpenD = expandedDates["drv_"+car.id+"_"+date] !== false && (expandedDates["drv_"+car.id+"_"+date] === true || isTodayD);
                    return (
                      <div key={date}>
                        <div onClick={() => toggleDate("drv_"+car.id+"_"+date)}
                          style={{ display: "flex", alignItems: "center", gap: 10, padding: "9px 16px", background: isTodayD ? (darkMode ? "#0c1e3c" : "#eff6ff") : (darkMode ? "#1e293b" : "#ede8ff"), cursor: "pointer", borderBottom: `1px solid ${T.border}`, userSelect: "none" }}>
                          <span style={{ fontSize: 13 }}>{isOpenD ? "▾" : "▸"}</span>
                          <span style={{ fontWeight: 700, fontSize: 13, color: isTodayD ? T.info : T.textCard }}>{isTodayD ? "Today — " : ""}{fmtDate(date)}</span>
                          {isTodayD && <span style={{ fontSize: 10, background: T.info, color: "#fff", padding: "1px 7px", borderRadius: 8, fontWeight: 700 }}>TODAY</span>}
                          <span style={{ marginLeft: "auto", fontSize: 12, color: T.mutedCard }}>{dayT.length} trip{dayT.length !== 1 ? "s" : ""}</span>
                        </div>
                        {isOpenD && (
                          <div className="scroll-table"><table style={css.table}>
                            <thead><tr>
                              {["#","Officer","PF ID","Department","Destination","Purpose","Depart","Return","Start KM","End KM","Dist","Status"].map(h => <th key={h} style={css.th}>{h}</th>)}
                            </tr></thead>
                            <tbody>
                              {dayT.map((t, i) => (
                                <tr key={t.id} style={{ background: !t.returnTime && t.approvalStatus === "approved" ? (darkMode ? "#052e16" : "#f0fdf4") : "transparent" }}>
                                  <td style={{ ...css.td, color: "#6b21a8", fontSize: 11, fontWeight: 600 }}>{i + 1}</td>
                                  <td style={{ ...css.td, fontWeight: 700 }}>{t.officerName}</td>
                                  <td style={{ ...css.td, fontSize: 12, color: "#4c1d95", fontWeight: 600 }}>{t.officerPfId || t.bookedByPfId || "—"}</td>
                                  <td style={{ ...css.td, fontSize: 12 }}>{t.department}</td>
                                  <td style={css.td}>{t.destination}</td>
                                  <td style={{ ...css.td, color: "#4c1d95", fontSize: 12, fontWeight: 600 }}>{t.purpose || "—"}</td>
                                  <td style={{ ...css.td, color: "#2563eb", fontWeight: 600 }}>{t.departureTime}</td>
                                  <td style={{ ...css.td, color: "#16a34a", fontWeight: 600 }}>{t.returnTime ? t.returnTime.split(" ")[1] || t.returnTime : <span style={{ color: "#94a3b8" }}>—</span>}</td>
                                  <td style={{ ...css.td, textAlign: "right" }}>{t.startKm || "—"}</td>
                                  <td style={{ ...css.td, textAlign: "right" }}>{t.endKm || "—"}</td>
                                  <td style={{ ...css.td, textAlign: "right", fontWeight: 600 }}>{t.startKm && t.endKm ? `${parseInt(t.endKm) - parseInt(t.startKm)} km` : "—"}</td>
                                  <td style={css.td}>{statusBadge(t)}</td>
                                </tr>
                              ))}
                            </tbody>
                          </table></div>
                        )}
                      </div>
                    );
                  })
                }
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ── BOOK TRIP ─────────────────────────────────────────────────
function BookTrip({ cars, trips, saveTrips, isCarBusy, activeTripForCar, setTab, currentUser, allUsers, darkMode, T, css }) {

  const freshUser = currentUser?.pfId ? allUsers.find(u => u.pfId === currentUser.pfId) : null;
  const initName = freshUser?.name || currentUser?.name || "";
  const initDept = freshUser?.department || currentUser?.department || "";
  const initPfId = currentUser?.pfId || "";

  const [pfInput, setPfInput] = useState(initPfId);
  const [matchedUser, setMatchedUser] = useState(initPfId ? { name: initName, pfId: initPfId, department: initDept } : null);
  const [form, setForm] = useState({ carId: "", officerName: initName, department: initDept, officerPfId: initPfId, destination: "", purpose: "", date: today(), departureTime: now(), startKm: "" });
  const [returnForm, setReturnForm] = useState({ tripId: "", returnTime: now(), endKm: "", remarks: "" });
  const [msg, setMsg] = useState("");

  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));
  const setR = (k, v) => setReturnForm(f => ({ ...f, [k]: v }));

  // Live PF ID lookup — auto-populate name & department
  const handlePfInput = (val) => {
    setPfInput(val);
    const trimmed = val.trim();
    if (trimmed.length >= 5) {
      const found = allUsers.find(u => u.pfId === trimmed);
      if (found) {
        setMatchedUser(found);
        setForm(f => ({ ...f, officerName: found.name, department: found.department || "", designation: found.designation || "", officerPfId: found.pfId }));
      } else {
        setMatchedUser(null);
        setForm(f => ({ ...f, officerName: "", department: "", officerPfId: "" }));
      }
    } else {
      setMatchedUser(null);
      setForm(f => ({ ...f, officerName: "", department: "", officerPfId: "" }));
    }
  };

  // Check if the booking user (not officer) already has an active/pending trip
  const userActiveTripPfId = currentUser?.pfId;
  const userHasActiveTrip = !currentUser?.isAdmin && trips.some(t =>
    !t.returnTime &&
    (t.approvalStatus === "approved" || t.approvalStatus === "pending") &&
    (t.bookedByPfId === userActiveTripPfId || t.officerPfId === userActiveTripPfId)
  );
  const userActiveTrip = userHasActiveTrip
    ? trips.find(t => !t.returnTime && (t.approvalStatus === "approved" || t.approvalStatus === "pending") && (t.bookedByPfId === userActiveTripPfId || t.officerPfId === userActiveTripPfId))
    : null;

  const handleBook = () => {
    if (!matchedUser) { setMsg("❌ Please enter a valid PF ID first."); return; }
    if (!form.carId || !form.destination || !form.date || !form.departureTime) {
      setMsg("❌ Please fill all required fields."); return;
    }

    // ── Date must be today only ──
    if (form.date !== today()) {
      setMsg("❌ Booking is only allowed for today's date. Please correct the date.");
      set("date", today());
      return;
    }

    // ── Departure time must be now or within 30 minutes from now ──
    const [nowH, nowM] = now().split(":").map(Number);
    const [depH, depM] = form.departureTime.split(":").map(Number);
    const nowTotalMin = nowH * 60 + nowM;
    const depTotalMin = depH * 60 + depM;
    const diffMin = depTotalMin - nowTotalMin;
    if (diffMin > 30) {
      setMsg("🚫 Journey time cannot be more than 30 minutes from now. Please book closer to your actual departure time.");
      return;
    }
    if (diffMin < -60) {
      setMsg("❌ Departure time appears to be in the past. Please enter the correct time.");
      return;
    }

    if (isCarBusy(form.carId)) { setMsg("❌ This vehicle is already booked or pending approval. Please select another vehicle."); return; }
    if (userHasActiveTrip && userActiveTrip) {
      setMsg("❌ You already have an active/pending trip (" + userActiveTrip.carName + " → " + userActiveTrip.destination + "). Please cancel or return that vehicle before booking another.");
      return;
    }
    const car = cars.find(c => c.id === form.carId);
    const newTrip = {
      id: Date.now().toString(), ...form,
      carName: car.name, carPlate: car.plate, driver: car.driver, driverPhone: car.driverPhone,
      bookedByPfId: currentUser?.pfId,
      approvalStatus: "pending",
      approvedBy: [],
      rejectedBy: null, rejectionReason: "",
      returnTime: "", endKm: "", remarks: "",
      bookedAt: new Date().toISOString(),
    };
    saveTrips([...trips, newTrip]);
    // Reset form — re-lookup current user's fresh data from merged list
    const fresh = currentUser?.pfId ? allUsers.find(u => u.pfId === currentUser.pfId) : null;
    setPfInput(currentUser?.pfId || "");
    setMatchedUser(fresh || null);
    setForm({ carId: "", officerName: fresh?.name || currentUser?.name || "", department: fresh?.department || "", officerPfId: currentUser?.pfId || "", destination: "", purpose: "", date: today(), departureTime: now(), startKm: "" });
    setMsg("✅ Trip request submitted! Awaiting approval from admins.");
    setTimeout(() => setMsg(""), 4000);
  };

  const handleReturn = () => {
    const tripId = returnForm.tripId || (trips.filter(t => !t.returnTime && t.approvalStatus === "approved" && (t.bookedByPfId === currentUser?.pfId || t.officerPfId === currentUser?.pfId))[0]?.id);
    if (!tripId || !returnForm.returnTime) { setMsg("❌ Please select trip and enter return time."); return; }
    const returnDate = returnForm.returnDate || today();
    const returnDateTime = returnDate + " " + returnForm.returnTime;
    const updated = trips.map(t => t.id === tripId ? { ...t, returnTime: returnDateTime, endKm: returnForm.endKm, remarks: returnForm.remarks } : t);
    saveTrips(updated);
    setReturnForm({ tripId: "", returnTime: now(), returnDate: today(), endKm: "", remarks: "" });
    setMsg("✅ Vehicle released successfully!");
    setTimeout(() => { setMsg(""); setTab("dashboard"); }, 1500);
  };

  // Only approved trips can be returned
  const activeTrips = trips.filter(t => !t.returnTime && t.approvalStatus === "approved");
  // Show current user's own pending/rejected trips
  const myTrips = trips.filter(t => t.bookedByPfId === currentUser?.pfId).slice().reverse().slice(0, 5);

  const approvalBadge = (t) => {
    if (t.approvalStatus === "approved") return <span style={css.badge(T.success)}>✅ Approved</span>;
    if (t.approvalStatus === "rejected") return <span style={css.badge(T.danger)}>❌ Rejected</span>;
    const count = t.approvedBy?.length || 0;
    return <span style={css.badge(T.warning)}>⏳ Awaiting Approval</span>;
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
      <div className="two-col" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20 }}>
        {/* Book */}
        <div style={css.card}>
          <div style={css.sectionTitle}>📤 Request a Vehicle</div>
          {msg && <div style={{ padding: "10px 14px", borderRadius: 8, background: msg.startsWith("✅") ? (darkMode ? "#052e16" : "#dcfce7") : (darkMode ? "#450a0a" : "#fee2e2"), marginBottom: 14, fontSize: 13, fontWeight: 600 }}>{msg}</div>}

          {/* Approval notice for non-admins */}
          {!currentUser?.isAdmin && (
            <div style={{ padding: "10px 14px", background: darkMode ? "#0c1e3c" : "#eff6ff", border: "1px solid #bfdbfe", borderRadius: 8, marginBottom: 16, fontSize: 12, color: "#1e40af" }}>
            ℹ️ Your trip request will be sent for approval to <b>Biswajit Bhattacharjee</b> and <b>Abhijit Bhattacharjee</b>. Approval from either one will confirm your vehicle.
            </div>
          )}

          <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
            {/* PF ID lookup field */}
            <div>
              <label style={css.label}>Officer PF ID *</label>
              <input
                style={{ ...css.input, border: `1.5px solid ${pfInput.length >= 5 ? (matchedUser ? "#16a34a" : "#dc2626") : T.border}`, transition: "border-color 0.2s" }}
                value={pfInput}
                onChange={e => handlePfInput(e.target.value)}
                placeholder="Enter PF ID to auto-fill name & department"
                maxLength={10}
              />
              {pfInput.length >= 5 && !matchedUser && (
                <div style={{ fontSize: 11, color: T.danger, marginTop: 4 }}>⚠ PF ID not found in authorised users list</div>
              )}
            </div>

            {/* Auto-populated user info card */}
            {matchedUser && (
              <div style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 14px", background: darkMode ? "#052e16" : "#f0fdf4", border: "1px solid #bbf7d0", borderRadius: 8 }}>
                <div style={{ width: 36, height: 36, borderRadius: "50%", background: "#16a34a", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 15, fontWeight: 800, color: "#fff", flexShrink: 0 }}>
                  {matchedUser.name.charAt(0)}
                </div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontWeight: 700, fontSize: 14, color: "#166534" }}>{matchedUser.name}{matchedUser.designation ? `, ${matchedUser.designation}` : ''}</div>
                  <div style={{ fontSize: 12, color: "#16a34a" }}>🏢 {matchedUser.department || "—"}</div>
                </div>
                <div style={{ fontSize: 11, color: "#16a34a", fontWeight: 600 }}>✓ Verified</div>
              </div>
            )}

            <div>
              <label style={css.label}>Select Vehicle *</label>
              <select style={css.select} value={form.carId} onChange={e => set("carId", e.target.value)}>
                <option value="">-- Choose Vehicle --</option>
                {cars.map(c => {
                  const busy = isCarBusy(c.id);
                  const isPending = busy && trips.some(t => t.carId === c.id && !t.returnTime && t.approvalStatus === "pending");
                  const statusLabel = isPending ? "(Pending Booking)" : busy ? "(On Duty)" : "(Available)";
                  return <option key={c.id} value={c.id} disabled={busy}>{c.name} — {c.plate} | Driver: {c.driver} {statusLabel}</option>;
                })}
              </select>
            </div>

            <div style={css.formGrid}>
              <div>
                <label style={css.label}>Officer Name</label>
                <input style={{ ...css.input, background: darkMode ? "#1e293b" : "#f8fafc", color: matchedUser ? T.textCard : T.mutedCard }} value={form.officerName} readOnly placeholder="Auto-filled from PF ID" />
              </div>
              <div>
                <label style={css.label}>Department</label>
                <input style={{ ...css.input, background: darkMode ? "#1e293b" : "#f8fafc", color: matchedUser ? T.textCard : T.mutedCard }} value={form.department} readOnly placeholder="Auto-filled from PF ID" />
              </div>
            </div>
            <div>
              <label style={css.label}>Destination *</label>
              <input style={css.input} value={form.destination} onChange={e => set("destination", e.target.value)} placeholder="Where are you going?" />
            </div>
            <div>
              <label style={css.label}>Purpose of Trip *</label>
              <input style={css.input} value={form.purpose} onChange={e => set("purpose", e.target.value)} placeholder="Official purpose / meeting details" />
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(140px, 1fr))", gap: 14 }}>
              <div>
                <label style={css.label}>Date * <span style={{ fontSize: 10, color: T.mutedCard, fontWeight: 400 }}>(today only)</span></label>
                <input type="date" style={{ ...css.input, opacity: 0.7, cursor: "not-allowed" }} value={today()} readOnly min={today()} max={today()} />
              </div>
              <div>
                <label style={css.label}>Departure Time * <span style={{ fontSize: 10, color: T.mutedCard, fontWeight: 400 }}>(within 30 min)</span></label>
                <input type="time" style={css.input} value={form.departureTime} onChange={e => set("departureTime", e.target.value)} />
              </div>
            </div>
            <div>
              <label style={css.label}>Start Odometer (km)</label>
              <input type="number" style={css.input} value={form.startKm} onChange={e => set("startKm", e.target.value)} placeholder="e.g. 45230" />
            </div>
            <button style={css.btn(T.info)} onClick={handleBook}>Submit Trip Request →</button>

            {/* Driver info + Call button — shown when a vehicle is selected */}
            {form.carId && (() => {
              const selCar = cars.find(c => c.id === form.carId);
              if (!selCar) return null;
              return (
