                <div style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 14px", background: darkMode ? "#0c1e3c" : "#f0f9ff", border: "1px solid #bae6fd", borderRadius: 8 }}>
                  <div style={{ width: 38, height: 38, borderRadius: "50%", background: selCar.color || T.info, display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontWeight: 800, fontSize: 16, flexShrink: 0 }}>
                    {selCar.driver.charAt(0)}
                  </div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontWeight: 700, fontSize: 13, color: "#0c4a6e" }}>🧑‍✈️ {selCar.driver}</div>
                    <div style={{ fontSize: 12, color: "#0369a1" }}>{selCar.driverPhone}</div>
                  </div>
                  <a href={`tel:${selCar.driverPhone}`}
                    style={{ display: "flex", alignItems: "center", gap: 6, padding: "8px 16px", borderRadius: 8, background: "#16a34a", color: "#fff", fontWeight: 700, fontSize: 13, textDecoration: "none", flexShrink: 0 }}>
                    📞 Call Driver
                  </a>
                </div>
              );
            })()}
          </div>
        </div>

        {/* Return */}
        <div style={css.card}>
          <div style={css.sectionTitle}>📥 Release Vehicle</div>
          {(() => {
            // Non-admin: only show their own active trip
            const myActiveTrips = currentUser.isAdmin
              ? activeTrips
              : activeTrips.filter(t => t.bookedByPfId === currentUser.pfId || t.officerPfId === currentUser.pfId);

            return myActiveTrips.length === 0 ? (
              <div style={{ textAlign: "center", color: T.mutedCard, padding: 40 }}>
                <div style={{ fontSize: 32, marginBottom: 8 }}>✅</div>
                <div>{currentUser.isAdmin ? "No approved active trips to return" : "You have no active trip to release"}</div>
              </div>
            ) : (
              <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
                {/* If admin, show dropdown. If user has only one trip, auto-select it */}
                {myActiveTrips.length > 1 ? (
                  <div>
                    <label style={css.label}>Select Active Trip *</label>
                    <select style={css.select} value={returnForm.tripId} onChange={e => setR("tripId", e.target.value)}>
                      <option value="">-- Select Trip --</option>
                      {myActiveTrips.map(t => <option key={t.id} value={t.id}>{t.carName} — {t.officerName} → {t.destination}</option>)}
                    </select>
                  </div>
                ) : (
                  // Auto-select single trip
                  returnForm.tripId !== myActiveTrips[0].id && setR("tripId", myActiveTrips[0].id) || null
                )}

                {/* Trip details card */}
                {(() => {
                  const tripId = returnForm.tripId || (myActiveTrips.length === 1 ? myActiveTrips[0].id : null);
                  const t = trips.find(x => x.id === tripId);
                  return t ? (
                    <div style={{ background: darkMode ? "#052e16" : "#f0fdf4", borderRadius: 8, padding: 14, fontSize: 13, border: "1px solid #bbf7d0" }}>
                      <div style={{ fontWeight: 700, fontSize: 14, color: "#166534", marginBottom: 8 }}>🚙 {t.carName} — {t.carPlate}</div>
                      <div style={{ color: T.mutedCard }}><b>Destination:</b> {t.destination}</div>
                      {t.startKm && <div style={{ color: T.mutedCard }}><b>Start KM:</b> {t.startKm}</div>}
                      {t.driver && t.driverPhone && (
                        <div style={{ display: "flex", alignItems: "center", gap: 12, marginTop: 10, padding: "10px 12px", background: darkMode ? "#0c1e3c" : "#f0f9ff", border: "1px solid #bae6fd", borderRadius: 8 }}>
                          <div style={{ flex: 1 }}>
                            <div style={{ fontWeight: 700, fontSize: 13, color: "#0c4a6e" }}>🧑‍✈️ {t.driver}</div>
                            <div style={{ fontSize: 12, color: "#0369a1" }}>{t.driverPhone}</div>
                          </div>
                          <a href={`tel:${t.driverPhone}`}
                            style={{ display: "flex", alignItems: "center", gap: 6, padding: "8px 16px", borderRadius: 8, background: "#16a34a", color: "#fff", fontWeight: 700, fontSize: 13, textDecoration: "none", flexShrink: 0 }}>
                            📞 Call Driver
                          </a>
                        </div>
                      )}
                    </div>
                  ) : null;
                })()}

                {/* Return date + time */}
                <div style={css.formGrid}>
                  <div>
                    <label style={css.label}>Return Date *</label>
                    <input type="date" style={css.input} value={returnForm.returnDate || today()} onChange={e => setR("returnDate", e.target.value)} />
                  </div>
                  <div>
                    <label style={css.label}>Return Time *</label>
                    <input type="time" style={css.input} value={returnForm.returnTime} onChange={e => setR("returnTime", e.target.value)} />
                  </div>
                </div>
                <div style={css.formGrid}>
                  <div>
                    <label style={css.label}>End Odometer (km)</label>
                    <input type="number" style={css.input} value={returnForm.endKm} onChange={e => setR("endKm", e.target.value)} placeholder="e.g. 45310" />
                  </div>
                  <div>
                    <label style={css.label}>Remarks</label>
                    <input style={css.input} value={returnForm.remarks} onChange={e => setR("remarks", e.target.value)} placeholder="Any issues, notes..." />
                  </div>
                </div>
                <button style={{ ...css.btn(T.success), fontSize: 15, padding: "12px 20px" }} onClick={handleReturn}>
                  🔓 Release Vehicle & Mark Returned
                </button>
              </div>
            );
          })()}

          {/* Admin: show all currently out vehicles */}
          {currentUser.isAdmin && activeTrips.length > 0 && (
            <div style={{ marginTop: 24 }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: T.mutedCard, marginBottom: 10 }}>CURRENTLY OUT (APPROVED)</div>
              {activeTrips.map(t => (
                <div key={t.id} style={{ padding: "10px 12px", background: darkMode ? "#052e16" : "#f0fdf4", borderRadius: 8, marginBottom: 8, borderLeft: "3px solid #16a34a" }}>
                  <div style={{ fontWeight: 700, fontSize: 13 }}>{t.carName} — {t.carPlate}</div>
                  <div style={{ fontSize: 12, color: T.mutedCard }}>🧑‍✈️ {t.driver} | {t.officerName} ({t.department})</div>
                  <div style={{ fontSize: 12, color: T.mutedCard }}>→ {t.destination} · Left at {t.departureTime}</div>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>

      {/* My recent trip requests */}
      {myTrips.length > 0 && (
        <div style={css.card}>
          <div style={css.sectionTitle}>📋 My Recent Trip Requests</div>
          <div className="scroll-table"><table style={css.table}>
            <thead><tr>{["Vehicle","Destination","Purpose","Date","Time","Approval Status","Approvals","Action"].map(h => <th key={h} style={css.th}>{h}</th>)}</tr></thead>
            <tbody>
              {myTrips.map(t => (
                <tr key={t.id}>
                  <td style={css.td}>{t.carName}</td>
                  <td style={css.td}>{t.destination}</td>
                  <td style={{ ...css.td, color: T.mutedCard }}>{t.purpose || "—"}</td>
                  <td style={css.td}>{fmtDate(t.date)}</td>
                  <td style={css.td}>{t.departureTime}</td>
                  <td style={css.td}>{approvalBadge(t)}</td>
                  <td style={css.td}>
                    {t.approvalStatus === "rejected"
                      ? <span style={{ color: T.danger, fontSize: 12 }}>Reason: {t.rejectionReason || "—"}</span>
                      : <span style={{ fontSize: 12, color: T.mutedCard }}>
                          {ADMIN_1.name}: {t.approvedBy?.includes(ADMIN_1.pfId) ? "✅" : "⏳"} &nbsp;
                          {ADMIN_2.name}: {t.approvedBy?.includes(ADMIN_2.pfId) ? "✅" : "⏳"}
                        </span>
                    }
                  </td>
                  <td style={css.td}>
                    <div style={{ display: "flex", gap: 6, alignItems: "center", flexWrap: "wrap" }}>
                      {t.approvalStatus === "pending" ? (
                        <button
                          onClick={() => {
                            if (window.confirm("Cancel this trip request for " + t.carName + " to " + t.destination + "?")) {
                              saveTrips(trips.filter(x => x.id !== t.id));
                              setMsg("✅ Trip request cancelled.");
                              setTimeout(() => setMsg(""), 3000);
                            }
                          }}
                          style={{ padding: "4px 12px", borderRadius: 6, border: "1px solid #fca5a5", background: "#fef2f2", color: "#dc2626", fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}
                        >✕ Cancel</button>
                      ) : (
                        <span style={{ fontSize: 12, color: T.mutedCard }}>—</span>
                      )}
                      {!t.returnTime && t.driverPhone && (
                        <a href={`tel:${t.driverPhone}`}
                          style={{ display: "inline-flex", alignItems: "center", gap: 4, padding: "4px 10px", borderRadius: 6, background: "#16a34a", color: "#fff", fontWeight: 600, fontSize: 12, textDecoration: "none" }}>
                          📞 Call
                        </a>
                      )}
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table></div>
        </div>
      )}
    </div>
  );
}

// ── APPROVALS ─────────────────────────────────────────────────
function Approvals({ trips, saveTrips, currentUser, cars, isCarBusy, darkMode, T, css }) {
  const [rejectId, setRejectId] = useState(null);
  const [rejectReason, setRejectReason] = useState("");
  const [filter, setFilter] = useState("pending");
  const [changeVehicleId, setChangeVehicleId] = useState(null);
  const [selectedNewCar, setSelectedNewCar] = useState("");

  const pending = trips.filter(t => t.approvalStatus === "pending");
  const approved = trips.filter(t => t.approvalStatus === "approved");
  const rejected = trips.filter(t => t.approvalStatus === "rejected");

  const handleApprove = (tripId) => {
    const updated = trips.map(t => {
      if (t.id !== tripId) return t;
      const newApprovedBy = [...(t.approvedBy || [])];
      if (!newApprovedBy.includes(currentUser.pfId)) newApprovedBy.push(currentUser.pfId);
      const fullyApproved = newApprovedBy.includes(ADMIN_1.pfId) || newApprovedBy.includes(ADMIN_2.pfId);
      return { ...t, approvedBy: newApprovedBy, approvalStatus: fullyApproved ? "approved" : "pending" };
    });
    saveTrips(updated);
  };

  const handleReject = (tripId) => {
    const updated = trips.map(t => t.id !== tripId ? t : {
      ...t, approvalStatus: "rejected", rejectedBy: currentUser.pfId,
      rejectedByName: currentUser.name, rejectionReason: rejectReason, rejectedAt: new Date().toISOString()
    });
    saveTrips(updated);
    setRejectId(null);
    setRejectReason("");
  };

  const handleChangeVehicle = (tripId) => {
    if (!selectedNewCar) return;
    const car = cars.find(c => c.id === selectedNewCar);
    if (!car) return;
    const updated = trips.map(t => t.id !== tripId ? t : {
      ...t, carId: car.id, carName: car.name, carPlate: car.plate,
      driver: car.driver, driverPhone: car.driverPhone,
      vehicleChangedBy: currentUser.name, vehicleChangedAt: new Date().toISOString()
    });
    saveTrips(updated);
    setChangeVehicleId(null);
    setSelectedNewCar("");
  };

  const displayTrips = filter === "pending" ? pending : filter === "approved" ? approved : rejected;

  const ApprovalCard = ({ t }) => {
    const myApproved = t.approvedBy?.includes(currentUser.pfId);
    const admin1Done = t.approvedBy?.includes(ADMIN_1.pfId);
    const admin2Done = t.approvedBy?.includes(ADMIN_2.pfId);
    return (
      <div style={{ ...css.card, marginBottom: 16, borderLeft: `4px solid ${t.approvalStatus === "approved" ? T.success : t.approvalStatus === "rejected" ? T.danger : T.warning}` }}>
        <div style={{ display: "flex", alignItems: "flex-start", gap: 16, flexWrap: "wrap" }}>
          <div style={{ flex: 1, minWidth: 200 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
              <div style={{ fontWeight: 800, fontSize: 15 }}>{t.officerName}</div>
              <span style={{ fontSize: 11, color: T.mutedCard }}>PF: {t.bookedByPfId}</span>
              {t.approvalStatus === "pending" && <span style={css.badge(T.warning)}>⏳ Pending</span>}
              {t.approvalStatus === "approved" && <span style={css.badge(T.success)}>✅ Approved</span>}
              {t.approvalStatus === "rejected" && <span style={css.badge(T.danger)}>❌ Rejected</span>}
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "4px 16px", fontSize: 13 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <span><span style={{ color: T.mutedCard }}>Vehicle:</span> <b>{t.carName}</b> ({t.carPlate})</span>
                {t.vehicleChangedBy && <span style={{ fontSize: 10, color: T.info, fontStyle: "italic" }}>Changed by {t.vehicleChangedBy}</span>}
              </div>
              <div><span style={{ color: T.mutedCard }}>Driver:</span> {t.driver}</div>
              <div><span style={{ color: T.mutedCard }}>Department:</span> {t.department}</div>
              <div><span style={{ color: T.mutedCard }}>Date:</span> {fmtDate(t.date)} at {t.departureTime}</div>
              <div><span style={{ color: T.mutedCard }}>Destination:</span> <b>{t.destination}</b></div>
              <div><span style={{ color: T.mutedCard }}>Purpose:</span> {t.purpose || "—"}</div>
            </div>
            {t.approvalStatus === "rejected" && (
              <div style={{ marginTop: 8, padding: "6px 10px", background: darkMode ? "#450a0a" : "#fee2e2", borderRadius: 6, fontSize: 12, color: T.danger }}>
                ❌ Rejected by {t.rejectedByName} — "{t.rejectionReason || 'No reason given'}"
              </div>
            )}
          </div>

          {/* Approval status indicators */}
          <div style={{ display: "flex", flexDirection: "column", gap: 8, minWidth: 200 }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: T.mutedCard, textTransform: "uppercase", letterSpacing: "0.05em" }}>Approval Status</div>
            {[ADMIN_1, ADMIN_2].map(admin => (
              <div key={admin.pfId} style={{ display: "flex", alignItems: "center", gap: 8, padding: "6px 10px", background: t.approvedBy?.includes(admin.pfId) ? (darkMode ? "#052e16" : "#f0fdf4") : (darkMode ? "#1e293b" : "#fafafa"), borderRadius: 6, border: `1px solid ${t.approvedBy?.includes(admin.pfId) ? "#bbf7d0" : T.border}` }}>
                <div style={{ fontSize: 16 }}>{t.approvedBy?.includes(admin.pfId) ? "✅" : "⏳"}</div>
                <div>
                  <div style={{ fontSize: 12, fontWeight: 700 }}>{admin.name}</div>
                  <div style={{ fontSize: 11, color: T.mutedCard }}>{t.approvedBy?.includes(admin.pfId) ? "Approved" : "Awaiting"}</div>
                </div>
              </div>
            ))}

            {/* Action buttons — only show for pending trips */}
            {t.approvalStatus === "pending" && !myApproved && (
              <div style={{ display: "flex", gap: 8, marginTop: 4 }}>
                <button style={{ ...css.btn(T.success), flex: 1, fontSize: 12 }} onClick={() => handleApprove(t.id)}>✅ Approve</button>
                <button style={{ ...css.btn(T.danger, true), flex: 1, fontSize: 12 }} onClick={() => setRejectId(t.id)}>❌ Reject</button>
              </div>
            )}
            {t.approvalStatus === "pending" && myApproved && (
              <div style={{ padding: "6px 10px", background: darkMode ? "#052e16" : "#f0fdf4", borderRadius: 6, fontSize: 12, color: T.success, fontWeight: 600 }}>
                ✅ You have approved this request
              </div>
            )}
            {/* Change Vehicle button — always visible for admin on pending trips */}
            {t.approvalStatus === "pending" && (
              <button
                style={{ ...css.btn(T.info, true), fontSize: 12, marginTop: 4 }}
                onClick={() => { setChangeVehicleId(changeVehicleId === t.id ? null : t.id); setSelectedNewCar(""); }}
              >🔄 Change Vehicle</button>
            )}
          </div>
        </div>

        {/* Change Vehicle panel */}
        {changeVehicleId === t.id && (
          <div style={{ marginTop: 14, padding: 14, background: darkMode ? "#0c1e3c" : "#eff6ff", borderRadius: 8, border: "1px solid #bfdbfe" }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: T.info, marginBottom: 10 }}>🔄 Change Assigned Vehicle</div>
            <div style={{ fontSize: 12, color: T.mutedCard, marginBottom: 10 }}>
              Currently: <b>{t.carName}</b> ({t.carPlate}) · Driver: {t.driver}
            </div>
            <select
              style={{ ...css.input, marginBottom: 10 }}
              value={selectedNewCar}
              onChange={e => setSelectedNewCar(e.target.value)}
            >
              <option value="">— Select a vehicle —</option>
              {cars.map(c => {
                const busyForOther = trips.some(x => x.carId === c.id && x.id !== t.id && !x.returnTime && (x.approvalStatus === "approved" || x.approvalStatus === "pending"));
                const isPending = busyForOther && trips.some(x => x.carId === c.id && x.id !== t.id && !x.returnTime && x.approvalStatus === "pending");
                return (
                  <option key={c.id} value={c.id} disabled={busyForOther}>
                    {c.name} — {c.plate} | Driver: {c.driver} {busyForOther ? (isPending ? "(Pending Booking)" : "(On Duty)") : c.id === t.carId ? "(Current)" : "(Available)"}
                  </option>
                );
              })}
            </select>
            <div style={{ display: "flex", gap: 8 }}>
              <button
                style={{ ...css.btn(T.info), fontSize: 12 }}
                disabled={!selectedNewCar || selectedNewCar === t.carId}
                onClick={() => handleChangeVehicle(t.id)}
              >✅ Confirm Change</button>
              <button style={{ ...css.btn(T.muted, true), fontSize: 12 }} onClick={() => { setChangeVehicleId(null); setSelectedNewCar(""); }}>Cancel</button>
            </div>
          </div>
        )}

        {/* Reject modal inline */}
        {rejectId === t.id && (
          <div style={{ marginTop: 14, padding: 14, background: darkMode ? "#450a0a" : "#fff1f2", borderRadius: 8, border: "1px solid #fecdd3" }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: T.danger, marginBottom: 8 }}>Reason for Rejection</div>
            <input style={{ ...css.input, marginBottom: 10 }} value={rejectReason} onChange={e => setRejectReason(e.target.value)} placeholder="Enter reason (optional)" autoFocus />
            <div style={{ display: "flex", gap: 8 }}>
              <button style={css.btn(T.danger)} onClick={() => handleReject(t.id)}>Confirm Rejection</button>
              <button style={css.btn(T.muted, true)} onClick={() => { setRejectId(null); setRejectReason(""); }}>Cancel</button>
            </div>
          </div>
        )}
      </div>
    );
  };

  return (
    <div>
      {/* Summary stats */}
      <div style={{ ...css.grid4, gridTemplateColumns: "repeat(3, 1fr)", marginBottom: 24 }}>
        <div style={{ ...css.card, borderTop: `3px solid ${T.warning}`, cursor: "pointer" }} onClick={() => setFilter("pending")}>
          <div style={{ ...css.statNum, color: T.warning }}>{pending.length}</div>
          <div style={css.statLabel}>Pending Approval</div>
        </div>
        <div style={{ ...css.card, borderTop: `3px solid ${T.success}`, cursor: "pointer" }} onClick={() => setFilter("approved")}>
          <div style={{ ...css.statNum, color: T.success }}>{approved.length}</div>
          <div style={css.statLabel}>Approved</div>
        </div>
        <div style={{ ...css.card, borderTop: `3px solid ${T.danger}`, cursor: "pointer" }} onClick={() => setFilter("rejected")}>
          <div style={{ ...css.statNum, color: T.danger }}>{rejected.length}</div>
          <div style={css.statLabel}>Rejected</div>
        </div>
      </div>

      {/* Filter tabs */}
      <div style={{ display: "flex", gap: 8, marginBottom: 20 }}>
        {[["pending","⏳ Pending"],["approved","✅ Approved"],["rejected","❌ Rejected"]].map(([f, label]) => (
          <button key={f} style={{ ...css.btn(f === "pending" ? T.warning : f === "approved" ? T.success : T.danger, filter !== f), fontSize: 13 }} onClick={() => setFilter(f)}>{label}</button>
        ))}
      </div>

      {displayTrips.length === 0
        ? <div style={{ ...css.card, textAlign: "center", padding: 48, color: T.mutedCard }}>No {filter} trip requests.</div>
        : displayTrips.slice().reverse().map(t => <ApprovalCard key={t.id} t={t} />)
      }
    </div>
  );
}

// ── LIVE TRACKING ─────────────────────────────────────────────
function LiveTracking({ cars, trips, liveLocations, saveLive, isCarBusy, activeTripForCar, darkMode, T, css }) {
  const [selected, setSelected] = useState(null);
  const [linkInput, setLinkInput] = useState("");
  const [msg, setMsg] = useState("");

  // Convert various Google Maps share link formats to embeddable src
  const toEmbedUrl = (url) => {
    if (!url) return null;
    // Already an embed link
    if (url.includes("google.com/maps/embed")) return url;
    // Live location share link: maps.app.goo.gl or goo.gl/maps
    if (url.includes("goo.gl") || url.includes("maps.app")) {
      // We embed via redirect — pass through as iframe src with output=embed
      return url;
    }
    // Standard google maps link — try to extract coords
    const coordMatch = url.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);
    if (coordMatch) {
      return `https://maps.google.com/maps?q=${coordMatch[1]},${coordMatch[2]}&z=15&output=embed`;
    }
    // place search link
    const placeMatch = url.match(/place\/([^/]+)/);
    if (placeMatch) {
      return `https://maps.google.com/maps?q=${encodeURIComponent(placeMatch[1])}&output=embed`;
    }
    // fallback — try direct embed
    return url;
  };

  const handleSaveLink = (carId) => {
    if (!linkInput.trim()) { setMsg("❌ Please paste a valid Google Maps link."); return; }
    const updated = { ...liveLocations, [carId]: { url: linkInput.trim(), updatedAt: new Date().toLocaleTimeString("en-IN", { hour: "2-digit", minute: "2-digit" }), updatedDate: today() } };
    saveLive(updated);
    setLinkInput("");
    setMsg("✅ Live location link saved!");
    setTimeout(() => setMsg(""), 2500);
  };

  const handleClear = (carId) => {
    const updated = { ...liveLocations };
    delete updated[carId];
    saveLive(updated);
    if (selected === carId) setSelected(null);
  };

  const activeTrip = selected ? activeTripForCar(selected) : null;
  const selectedCar = cars.find(c => c.id === selected);
  const embedUrl = selected && liveLocations[selected] ? toEmbedUrl(liveLocations[selected].url) : null;

  return (
    <div>
      <div style={{ marginBottom: 16, padding: "12px 16px", background: darkMode ? "#0c1e3c" : "#eff6ff", borderRadius: 8, border: "1px solid #bfdbfe", fontSize: 13 }}>
        <b>📱 How to share live location from Google Maps:</b>
        <ol style={{ marginTop: 8, paddingLeft: 20, lineHeight: 2 }}>
          <li>Driver opens <b>Google Maps</b> on their phone</li>
          <li>Taps their <b>profile photo → Share location</b></li>
          <li>Selects duration (1 hr / until turned off) → taps <b>Share</b></li>
          <li>Copies the link and sends it to the admin via WhatsApp</li>
          <li>Admin pastes the link below for the respective vehicle</li>
        </ol>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "320px 1fr", gap: 20 }}>
        {/* Left panel — vehicle list */}
        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          {cars.map(car => {
            const busy = isCarBusy(car.id);
            const trip = activeTripForCar(car.id);
            const hasLink = !!liveLocations[car.id];
            const isSelected = selected === car.id;
            return (
              <div key={car.id} style={{ ...css.card, border: `2px solid ${isSelected ? car.color : T.border}`, cursor: "pointer", transition: "all 0.15s" }}
                onClick={() => setSelected(isSelected ? null : car.id)}>
                <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
                  <div style={{ width: 10, height: 10, borderRadius: "50%", background: busy ? T.danger : T.success, flexShrink: 0 }} />
                  <div style={{ fontWeight: 700, fontSize: 14 }}>{car.name}</div>
                  <div style={{ marginLeft: "auto" }}>
                    {hasLink
                      ? <span style={css.badge("#0891b2")}>📍 Link Active</span>
                      : <span style={css.badge(T.muted)}>No Link</span>}
                  </div>
                </div>
                <div style={{ fontSize: 12, color: T.mutedCard }}>{car.plate}</div>
                <div style={{ fontSize: 12, color: T.mutedCard }}>🧑‍✈️ {car.driver} · <a href={`tel:${car.driverPhone}`} style={{ color: "#2563eb" }} onClick={e => e.stopPropagation()}>{car.driverPhone}</a></div>
                {trip && <div style={{ marginTop: 6, fontSize: 12, color: T.warning, fontWeight: 600 }}>🔄 En route to {trip.destination}</div>}
                {hasLink && liveLocations[car.id]?.updatedAt && (
                  <div style={{ fontSize: 11, color: T.mutedCard, marginTop: 4 }}>Updated: {liveLocations[car.id].updatedDate} at {liveLocations[car.id].updatedAt}</div>
                )}
              </div>
            );
          })}
        </div>

        {/* Right panel — map + link input */}
        <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
          {msg && <div style={{ padding: "10px 14px", borderRadius: 8, background: msg.startsWith("✅") ? (darkMode ? "#052e16" : "#dcfce7") : (darkMode ? "#450a0a" : "#fee2e2"), fontSize: 13, fontWeight: 600 }}>{msg}</div>}

          {/* Link paste panel */}
          {selected && (
            <div style={css.card}>
              <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 12 }}>
                📍 {selectedCar?.name} — {selectedCar?.plate}
                <span style={{ fontSize: 12, fontWeight: 400, color: T.mutedCard, marginLeft: 8 }}>Driver: {selectedCar?.driver}</span>
              </div>
              <div style={{ display: "flex", gap: 10 }}>
                <input
                  style={{ ...css.input, flex: 1 }}
                  value={linkInput}
                  onChange={e => setLinkInput(e.target.value)}
                  placeholder="Paste Google Maps live location link here..."
                />
                <button style={css.btn("#0891b2")} onClick={() => handleSaveLink(selected)}>Save Link</button>
                {liveLocations[selected] && (
                  <button style={css.btn(T.danger, true)} onClick={() => handleClear(selected)}>Clear</button>
                )}
              </div>
              {liveLocations[selected] && (
                <div style={{ marginTop: 8, fontSize: 12, color: T.mutedCard, wordBreak: "break-all" }}>
                  Current link: <a href={liveLocations[selected].url} target="_blank" rel="noreferrer" style={{ color: "#2563eb" }}>{liveLocations[selected].url}</a>
                </div>
              )}
            </div>
          )}

          {/* Map embed */}
          {selected && embedUrl ? (
            <div style={{ ...css.card, padding: 0, overflow: "hidden", borderRadius: 10 }}>
              <div style={{ padding: "12px 16px", background: T.light, borderBottom: `1px solid ${T.border}`, display: "flex", alignItems: "center", gap: 10 }}>
                <div style={{ width: 8, height: 8, borderRadius: "50%", background: "#22c55e", boxShadow: "0 0 0 3px #bbf7d0", animation: "pulse 1.5s infinite" }} />
                <span style={{ fontSize: 13, fontWeight: 700 }}>Live Location — {selectedCar?.name}</span>
                <a href={liveLocations[selected]?.url} target="_blank" rel="noreferrer"
                  style={{ marginLeft: "auto", fontSize: 12, color: "#2563eb", textDecoration: "none", fontWeight: 600 }}>
                  Open in Google Maps ↗
                </a>
              </div>
              <iframe
                src={embedUrl}
                width="100%"
                height="480"
                style={{ border: "none", display: "block" }}
                allowFullScreen
                loading="lazy"
                referrerPolicy="no-referrer-when-downgrade"
                title={`Live location - ${selectedCar?.name}`}
              />
              <style>{`@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }`}</style>
            </div>
          ) : selected ? (
            <div style={{ ...css.card, textAlign: "center", padding: 60, color: T.mutedCard }}>
              <div style={{ fontSize: 48, marginBottom: 16 }}>📍</div>
              <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 8 }}>No live location link yet</div>
              <div style={{ fontSize: 13 }}>Ask the driver to share their live location via Google Maps and paste the link above.</div>
            </div>
          ) : (
            <div style={{ ...css.card, textAlign: "center", padding: 60, color: T.mutedCard }}>
              <div style={{ fontSize: 48, marginBottom: 16 }}>🗺️</div>
              <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 8 }}>Select a vehicle to view its location</div>
              <div style={{ fontSize: 13 }}>Click any vehicle card on the left to manage its live location link.</div>
            </div>
          )}

          {/* All active trips quick view */}
          {!selected && (
            <div style={css.card}>
              <div style={css.sectionTitle}>🔄 Vehicles Currently Out</div>
              {cars.filter(c => isCarBusy(c.id)).length === 0 ? (
                <div style={{ color: T.mutedCard, fontSize: 13 }}>All vehicles are currently at the office.</div>
              ) : cars.filter(c => isCarBusy(c.id)).map(car => {
                const trip = activeTripForCar(car.id);
                const hasLink = !!liveLocations[car.id];
                return (
                  <div key={car.id} style={{ display: "flex", alignItems: "center", gap: 14, padding: "12px 14px", background: T.light, borderRadius: 8, marginBottom: 8, border: `1px solid ${T.border}` }}>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontWeight: 700, fontSize: 13 }}>{car.name} — {car.plate}</div>
                      <div style={{ fontSize: 12, color: T.mutedCard }}>🧑‍✈️ {car.driver} · {trip?.officerName} ({trip?.department})</div>
                      <div style={{ fontSize: 12, color: T.mutedCard }}>→ {trip?.destination} since {trip?.departureTime}</div>
                    </div>
                    {hasLink ? (
                      <a href={liveLocations[car.id].url} target="_blank" rel="noreferrer"
                        style={{ ...css.btn("#0891b2"), textDecoration: "none", fontSize: 12 }}>
                        📍 Track
                      </a>
                    ) : (
                      <button style={css.btn(T.muted, true)} onClick={() => setSelected(car.id)}>+ Add Link</button>
                    )}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── TRIP LOG ──────────────────────────────────────────────────
function TripLog({ cars, trips, currentUser, darkMode, T, css }) {
  const [filter, setFilter] = useState({ car: "", dept: "", from: "", to: "" });
  const set = (k, v) => setFilter(f => ({ ...f, [k]: v }));

  // Non-admins only see their own trips
  const visibleTrips = currentUser?.isAdmin
    ? trips
    : trips.filter(t => t.bookedByPfId === currentUser?.pfId || t.officerPfId === currentUser?.pfId);

  const filtered = visibleTrips.filter(t =>
    (!filter.car || t.carId === filter.car) &&
    (!filter.dept || t.department === filter.dept) &&
    (!filter.from || t.date >= filter.from) &&
    (!filter.to || t.date <= filter.to)
  ).slice().reverse();

  const totalKm = filtered.reduce((s, t) => {
    if (t.startKm && t.endKm) return s + (parseFloat(t.endKm) - parseFloat(t.startKm));
    return s;
  }, 0);

  // Calculate total duration in minutes between out date+time and in date+time
  const calcDuration = (t) => {
    if (!t.returnTime) return null;
    try {
      // outDateTime: t.date + " " + t.departureTime  e.g. "2026-03-09 10:30"
      // returnTime stored as "YYYY-MM-DD HH:MM"
      const outStr = t.date + " " + t.departureTime;
      const inStr  = t.returnTime; // already "YYYY-MM-DD HH:MM"
      const outDt  = new Date(outStr.replace(" ", "T"));
      const inDt   = new Date(inStr.replace(" ", "T"));
      if (isNaN(outDt) || isNaN(inDt)) return null;
      const diffMs  = inDt - outDt;
      if (diffMs < 0) return null;
      const totalMin = Math.round(diffMs / 60000);
      const hrs  = Math.floor(totalMin / 60);
      const mins = totalMin % 60;
      if (hrs === 0) return `${mins}m`;
      if (mins === 0) return `${hrs}h`;
      return `${hrs}h ${mins}m`;
    } catch { return null; }
  };

  // Split returnTime "YYYY-MM-DD HH:MM" into date and time parts
  const splitReturn = (returnTime) => {
    if (!returnTime) return { date: null, time: null };
    const parts = returnTime.split(" ");
    return { date: parts[0] || null, time: parts[1] || null };
  };

  const [expandedLogDates, setExpandedLogDates] = useState({ [today()]: true });
  const [expandedLogMonths, setExpandedLogMonths] = useState({});
  const [expandedLogYears, setExpandedLogYears] = useState({});
  const [showOlderYears, setShowOlderYears] = useState(false);
  const toggleLogDate  = (d)  => setExpandedLogDates(prev  => ({ ...prev,  [d]:  !prev[d] }));
  const toggleLogMonth = (mk) => setExpandedLogMonths(prev => ({ ...prev, [mk]: !prev[mk] }));
  const toggleLogYear  = (yk) => setExpandedLogYears(prev  => ({ ...prev,  [yk]: !prev[yk] }));

  // Group filtered trips by date
  const logDateMap = {};
  filtered.forEach(t => { const d = t.date || "unknown"; if (!logDateMap[d]) logDateMap[d] = []; logDateMap[d].push(t); });
  const logSortedDates = Object.keys(logDateMap).sort((a, b) => b.localeCompare(a));
  const { thisMonthDates: logThisMonth, pastMonths: logPastMonths, oldYears: logOldYears } = groupDatesByMonthYear(logSortedDates);
  const logOldYearKeys = Object.keys(logOldYears).sort((a,b) => b.localeCompare(a));

  return (
    <div>
      <div style={css.card}>
        <div style={{ ...css.row, marginBottom: 16, flexWrap: "wrap" }}>
          <div style={css.sectionTitle}>📋 Trip Log{!currentUser?.isAdmin ? " (My Trips)" : ""}</div>
          <div style={{ marginLeft: "auto", fontSize: 13, color: T.mutedCard }}>{filtered.length} records · {totalKm.toFixed(0)} km total</div>
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 12, marginBottom: 20 }}>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: 14 }}>
            <div>
              <label style={css.label}>Filter by Car</label>
              <select style={css.select} value={filter.car} onChange={e => set("car", e.target.value)}>
                <option value="">All Cars</option>
                {cars.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
              </select>
            </div>
            <div>
              <label style={css.label}>Filter by Department</label>
              <select style={css.select} value={filter.dept} onChange={e => set("dept", e.target.value)}>
                <option value="">All Departments</option>
                {[...new Set(trips.map(t => t.department).filter(Boolean))].sort().map(d => <option key={d}>{d}</option>)}
              </select>
            </div>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
            <div>
              <label style={css.label}>From Date</label>
              <input type="date" style={css.input} value={filter.from} onChange={e => set("from", e.target.value)} />
            </div>
            <div>
              <label style={css.label}>To Date</label>
              <input type="date" style={css.input} value={filter.to} onChange={e => set("to", e.target.value)} />
            </div>
          </div>
        </div>
        {filtered.length === 0
          ? <div style={{ textAlign: "center", padding: 40, color: T.mutedCard }}>No trips found</div>
          : (() => {
            // Renders a single date row with its trip table
            const renderDateBlock = (date) => {
              const dayTripsLog = logDateMap[date];
              const isTodayLog = date === today();
              const isOpenLog = expandedLogDates[date] !== false && (expandedLogDates[date] === true || isTodayLog);
              return (
                <div key={date} style={{ marginBottom: 6, borderRadius: 8, border: `1px solid ${isTodayLog ? T.info : T.border}`, overflow: "hidden" }}>
                  <div onClick={() => toggleLogDate(date)}
                    style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 14px", background: isTodayLog ? (darkMode ? "#0c1e3c" : "#eff6ff") : (darkMode ? "#1e1040" : "#ede8ff"), cursor: "pointer", userSelect: "none", borderBottom: isOpenLog ? `1px solid ${T.border}` : "none" }}>
                    <span style={{ fontSize: 13 }}>{isOpenLog ? "▾" : "▸"}</span>
                    <span style={{ fontWeight: 800, fontSize: 13, color: isTodayLog ? T.info : T.textCard }}>{isTodayLog ? "Today — " : ""}{fmtDate(date)}</span>
                    {isTodayLog && <span style={{ fontSize: 10, background: T.info, color: "#fff", padding: "1px 7px", borderRadius: 8, fontWeight: 700 }}>TODAY</span>}
                    <span style={{ marginLeft: "auto", fontSize: 12, color: T.mutedCard }}>{dayTripsLog.length} trip{dayTripsLog.length !== 1 ? "s" : ""}</span>
                  </div>
                  {isOpenLog && (
                    <div className="scroll-table"><table style={css.table}>
                      <thead><tr>
                        {["#","Vehicle","Plate","Driver","Officer","Department","Destination","Purpose","Out Time","In Date","In Time","Total Time","Start KM","End KM","Distance","Status"].map(h =>
                          <th key={h} style={{ ...css.th, whiteSpace: "nowrap" }}>{h}</th>
                        )}
                      </tr></thead>
                      <tbody>
                        {dayTripsLog.map((t, i) => {
                          const dist = (t.startKm && t.endKm) ? (parseFloat(t.endKm) - parseFloat(t.startKm)).toFixed(0) + " km" : "—";
                          const duration = calcDuration(t);
                          const ret = splitReturn(t.returnTime);
                          return (
                            <tr key={t.id}>
                              <td style={{ ...css.td, color: T.mutedCard }}>{i + 1}</td>
                              <td style={css.td}>{t.carName}</td>
                              <td style={css.td}>{t.carPlate || "—"}</td>
                              <td style={{ ...css.td, fontWeight: 600 }}>{t.driver || "—"}</td>
                              <td style={{ ...css.td, fontWeight: 600 }}>{t.officerName}</td>
                              <td style={css.td}>{t.department}</td>
                              <td style={css.td}>{t.destination}</td>
                              <td style={{ ...css.td, color: T.mutedCard }}>{t.purpose || "—"}</td>
                              <td style={{ ...css.td, whiteSpace: "nowrap", color: "#2563eb", fontWeight: 600 }}>{fmtTime(t.departureTime)}</td>
                              <td style={{ ...css.td, whiteSpace: "nowrap" }}>{ret.date ? fmtDate(ret.date) : <span style={{ color: "#94a3b8" }}>—</span>}</td>
                              <td style={{ ...css.td, whiteSpace: "nowrap", color: "#16a34a", fontWeight: 600 }}>{ret.time ? fmtTime(ret.time) : <span style={{ color: "#94a3b8" }}>—</span>}</td>
                              <td style={{ ...css.td, whiteSpace: "nowrap" }}>
                                {duration ? <span style={{ fontWeight: 700, color: "#7c3aed", background: "#ede9fe", padding: "2px 8px", borderRadius: 6, fontSize: 12 }}>⏱ {duration}</span> : <span style={{ color: "#94a3b8" }}>—</span>}
                              </td>
                              <td style={css.td}>{t.startKm || "—"}</td>
                              <td style={css.td}>{t.endKm || "—"}</td>
                              <td style={{ ...css.td, fontWeight: 600 }}>{dist}</td>
                              <td style={css.td}>
                                {t.returnTime
                                  ? <span style={css.badge(T.success)}>✅ Done</span>
                                  : t.approvalStatus === "rejected"
                                    ? <span style={css.badge(T.danger)}>❌ Rejected</span>
                                    : t.approvalStatus === "pending"
                                      ? <span style={css.badge(T.warning)}>⏳ Pending</span>
                                      : <span style={css.badge("#0891b2")}>🚗 Active</span>
                                }
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table></div>
                  )}
                </div>
              );
            };

            // Renders a collapsed month accordion wrapping date blocks
            const renderMonthAccordion = (mk, dates) => {
              const isOpen = !!expandedLogMonths[mk];
              const totalTrips = dates.reduce((s, d) => s + (logDateMap[d]?.length || 0), 0);
              return (
                <div key={mk} style={{ marginBottom: 8, borderRadius: 10, border: `1px solid ${T.border}`, overflow: "hidden" }}>
                  <div onClick={() => toggleLogMonth(mk)}
                    style={{ display: "flex", alignItems: "center", gap: 10, padding: "11px 16px", background: darkMode ? "#1a2540" : "#ede8ff", cursor: "pointer", userSelect: "none" }}>
                    <span style={{ fontSize: 14 }}>{isOpen ? "▾" : "▸"}</span>
                    <span style={{ fontSize: 13, fontWeight: 800, color: T.textCard }}>📅 {fmtMonthKey(mk)}</span>
                    <span style={{ marginLeft: "auto", fontSize: 12, color: T.mutedCard }}>{dates.length} day{dates.length !== 1 ? "s" : ""} · {totalTrips} trip{totalTrips !== 1 ? "s" : ""}</span>
                  </div>
                  {isOpen && (
                    <div style={{ padding: "8px 10px", borderTop: `1px solid ${T.border}` }}>
                      {dates.map(d => renderDateBlock(d))}
                    </div>
                  )}
                </div>
              );
            };

            return (
              <div>
                {/* ── Current month: latest first with date separators ── */}
                {logThisMonth.length > 0 && (
                  <div style={{ marginBottom: 16 }}>
                    <div style={{ fontSize: 11, fontWeight: 800, color: T.info, letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 8, paddingLeft: 4 }}>
                      📅 {fmtMonthKey(currentMonthKey())} — This Month
                    </div>
                    {logThisMonth.map(d => renderDateBlock(d))}
                  </div>
                )}

                {/* ── Past months this year: collapsed accordions ── */}
                {Object.keys(logPastMonths).sort((a,b) => b.localeCompare(a)).length > 0 && (
                  <div style={{ marginBottom: 16 }}>
                    <div style={{ fontSize: 11, fontWeight: 800, color: T.mutedCard, letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 8, paddingLeft: 4 }}>
                      Earlier This Year — Click to Expand
                    </div>
                    {Object.keys(logPastMonths).sort((a,b) => b.localeCompare(a)).map(mk =>
                      renderMonthAccordion(mk, logPastMonths[mk])
                    )}
                  </div>
                )}

                {/* ── Older years: View Older Records button ── */}
                {logOldYearKeys.length > 0 && (
                  <div style={{ marginBottom: 8 }}>
                    {!showOlderYears
                      ? <button onClick={() => setShowOlderYears(true)}
                          style={{ width: "100%", padding: "12px", borderRadius: 10, border: `1.5px dashed ${T.lightBorder}`, background: "transparent", color: T.mutedCard, fontWeight: 700, fontSize: 13, cursor: "pointer", letterSpacing: "0.02em" }}>
                          🗂 View Older Records ({logOldYearKeys.join(", ")})
                        </button>
                      : logOldYearKeys.map(yk => {
                          const isYearOpen = !!expandedLogYears[yk];
                          const monthKeys = Object.keys(logOldYears[yk]).sort((a,b) => b.localeCompare(a));
                          const totalTrips = monthKeys.reduce((s, mk) => s + logOldYears[yk][mk].reduce((ss, d) => ss + (logDateMap[d]?.length || 0), 0), 0);
                          return (
                            <div key={yk} style={{ marginBottom: 10, borderRadius: 10, border: `1.5px solid ${T.border}`, overflow: "hidden" }}>
                              <div onClick={() => toggleLogYear(yk)}
                                style={{ display: "flex", alignItems: "center", gap: 10, padding: "12px 16px", background: darkMode ? "#1a2540" : "#e0d8ff", cursor: "pointer", userSelect: "none" }}>
                                <span style={{ fontSize: 16 }}>{isYearOpen ? "▾" : "▸"}</span>
                                <span style={{ fontSize: 14, fontWeight: 800, color: T.textCard }}>🗂 {yk}</span>
                                <span style={{ marginLeft: "auto", fontSize: 12, color: T.mutedCard }}>{monthKeys.length} month{monthKeys.length !== 1 ? "s" : ""} · {totalTrips} trips</span>
                              </div>
                              {isYearOpen && (
                                <div style={{ padding: "10px 12px", borderTop: `1px solid ${T.border}` }}>
                                  {monthKeys.map(mk => renderMonthAccordion(mk, logOldYears[yk][mk]))}
                                </div>
                              )}
                            </div>
                          );
                        })
                    }
                  </div>
                )}
              </div>
            );
          })()
        }
      </div>
    </div>
  );
}

  const [msg, setMsg] = useState("");

  const handleAdd = () => {
    if (!form.carId || !form.type || !form.date) { setMsg("❌ Car, type and date required."); return; }
    const car = cars.find(c => c.id === form.carId);
    const entry = { id: Date.now().toString(), ...form, carName: car.name };
    saveMaint([...maintenance, entry]);
    setForm({ carId: "", type: "", description: "", date: today(), cost: "", vendor: "", nextDueDate: "", status: "Pending", loggedBy: "" });

  return (
    <div style={{ display: "grid", gridTemplateColumns: "360px 1fr", gap: 20 }}>

            <select style={css.select} value={form.carId} onChange={e => set("carId", e.target.value)}>
              <option value="">-- Select Car --</option>
              {cars.map(c => <option key={c.id} value={c.id}>{c.name} — {c.model}</option>)}
            </select>
          </div>
          <div><label style={css.label}>Type *</label>
            <select style={css.select} value={form.type} onChange={e => set("type", e.target.value)}>
              <option value="">-- Select Type --</option>
              {TYPES.map(t => <option key={t}>{t}</option>)}
            </select>
          </div>
          <div><label style={css.label}>Description</label>
            <input style={css.input} value={form.description} onChange={e => set("description", e.target.value)} placeholder="Details..." />

              <input type="date" style={css.input} value={form.date} onChange={e => set("date", e.target.value)} />
            </div>
            <div><label style={css.label}>Cost (₹)</label>
              <input type="number" style={css.input} value={form.cost} onChange={e => set("cost", e.target.value)} />
            </div>
          </div>
          <div><label style={css.label}>Vendor / Workshop</label>
            <input style={css.input} value={form.vendor} onChange={e => set("vendor", e.target.value)} />
          </div>
          <div><label style={css.label}>Next Due Date</label>
            <input type="date" style={css.input} value={form.nextDueDate} onChange={e => set("nextDueDate", e.target.value)} />
          </div>
          <div><label style={css.label}>Status</label>
            <select style={css.select} value={form.status} onChange={e => set("status", e.target.value)}>
              <option>Pending</option><option>Completed</option>
            </select>
          </div>
          <div><label style={css.label}>Logged By</label>
            <input style={css.input} value={form.loggedBy} onChange={e => set("loggedBy", e.target.value)} />
          </div>
          <button style={css.btn(T.danger)} onClick={handleAdd}>Log Maintenance 🔧</button>
        </div>
      </div>

      <div>
        <div style={{ ...css.grid4, gridTemplateColumns: "1fr 1fr 1fr" }}>
          <div style={{ ...css.card, borderTop: `3px solid ${T.danger}` }}><div style={css.statNum}>{pending}</div><div style={css.statLabel}>Pending</div></div>
          <div style={{ ...css.card, borderTop: `3px solid ${T.success}` }}><div style={css.statNum}>{maintenance.length - pending}</div><div style={css.statLabel}>Completed</div></div>
          <div style={{ ...css.card, borderTop: `3px solid ${T.info}` }}><div style={css.statNum}>₹{totalCost.toLocaleString()}</div><div style={css.statLabel}>Total Spent</div></div>
        </div>
        <div style={css.card}>
          <div style={css.sectionTitle}>Maintenance Records</div>
          <div style={{ overflowX: "auto" }}>
            <div className="scroll-table"><table style={css.table}>
              <thead><tr>{["Car","Type","Description","Date","Cost","Vendor","Next Due","Logged By","Status","Action"].map(h => <th key={h} style={css.th}>{h}</th>)}</tr></thead>
              <tbody>
                {maintenance.slice().reverse().map(m => (
                  <tr key={m.id}>
                    <td style={css.td}>{m.carName}</td>
                    <td style={{ ...css.td, fontWeight: 600 }}>{m.type}</td>
                    <td style={{ ...css.td, color: T.mutedCard }}>{m.description || "—"}</td>
                    <td style={css.td}>{fmtDate(m.date)}</td>
                    <td style={css.td}>{m.cost ? `₹${m.cost}` : "—"}</td>
                    <td style={css.td}>{m.vendor || "—"}</td>
                    <td style={css.td}>{fmtDate(m.nextDueDate)}</td>
                    <td style={css.td}>{m.loggedBy || "—"}</td>
                    <td style={css.td}><span style={css.badge(m.status === "Completed" ? T.success : T.warning)}>{m.status}</span></td>
                    <td style={css.td}><button style={css.btnSm(m.status === "Pending" ? T.success : T.muted)} onClick={() => toggleStatus(m.id)}>{m.status === "Pending" ? "✓ Done" : "↩ Reopen"}</button></td>
                  </tr>
                ))}
                {maintenance.length === 0 && <tr><td colSpan={10} style={{ ...css.td, textAlign: "center", color: T.mutedCard }}>No maintenance records yet</td></tr>}
              </tbody>
            </table></div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── USER MANAGEMENT ──────────────────────────────────────────
function UserManagement({ currentUser, cars, saveCars, allUsers, saveAllUsers, savePassword, darkMode, T, css }) {
  const users = allUsers;
  const saveUsers = saveAllUsers;
  const [search, setSearch] = useState("");
  const [form, setForm] = useState({ name: "", pfId: "", department: "" });
  const [msg, setMsg] = useState("");
  const [confirmDelete, setConfirmDelete] = useState(null);
  const [editUser, setEditUser] = useState(null);
  const [resetPwUser, setResetPwUser] = useState(null);
  const [resetPwMsg, setResetPwMsg] = useState("");

  const showMsg = (m) => { setMsg(m); setTimeout(() => setMsg(""), 4000); };

  // Force-write current live user list to Firebase — saves all additions, edits, role changes
  const forceSaveToServer = async () => {
    showMsg("⏳ Saving current user list to server...");
    try {
      const db = window.__db;
      if (db) {
        await db.collection("config").doc("users").set({ list: users, _seeded: true });
        showMsg("✅ Done! Current user list (" + users.length + " users) saved permanently on all devices.");
      }
    } catch(e) {
      showMsg("❌ Save failed: " + e.message);
    }
  };

  // Sync fresh AUTHORISED_USERS from code to Firebase, preserving isAssistant flags
  const [syncConfirm, setSyncConfirm] = useState(false);
  const syncNewUserList = async () => {
    showMsg("⏳ Syncing new user list to Firebase...");
    try {
      const db = window.__db;
      if (!db) { showMsg("❌ No database connection."); return; }
      // Preserve isAssistant flags from current list
      const newList = AUTHORISED_USERS.map(u => {
        const existing = users.find(e => e.pfId === u.pfId);
        return { ...u, isAssistant: !!(existing?.isAssistant) };
      });
      await db.collection("config").doc("users").set({ list: newList, _seeded: true });
      saveAllUsers(newList);
      showMsg("✅ Done! New list of " + newList.length + " users synced to Firebase. Old list replaced.");
      setSyncConfirm(false);
    } catch(e) {
      showMsg("❌ Sync failed: " + e.message);
    }
  };

  const handleAdd = () => {
    if (!form.name.trim() || !form.pfId.trim() || !form.department.trim()) { showMsg("❌ All fields are required."); return; }
    if (users.find(u => u.pfId === form.pfId.trim())) { showMsg("❌ PF ID already exists."); return; }
    saveUsers([...users, { name: form.name.trim().toUpperCase(), pfId: form.pfId.trim(), department: form.department.trim() }]);
    setForm({ name: "", pfId: "", department: "" });
    showMsg("✅ User added successfully!");
  };

  const handleDelete = (pfId) => {
    if (pfId === ADMIN_1.pfId || pfId === ADMIN_2.pfId) { showMsg("❌ Cannot delete admin accounts."); return; }
    saveUsers(users.filter(u => u.pfId !== pfId));
    setConfirmDelete(null);
    showMsg("✅ User removed.");
  };

  const handleEdit = () => {
    if (!editUser.name.trim() || !editUser.department.trim()) { showMsg("❌ Name and department are required."); return; }
    saveUsers(users.map(u => u.pfId === editUser.pfId ? { ...u, name: editUser.name.trim().toUpperCase(), department: editUser.department.trim() } : u));
    setEditUser(null);
    showMsg("✅ User updated.");
  };

  const filtered = users.filter(u =>
    !search || u.name.toLowerCase().includes(search.toLowerCase()) ||
    u.pfId.includes(search) || u.department.toLowerCase().includes(search.toLowerCase())
  );
  const depts = [...new Set(users.map(u => u.department))].sort();

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>

      {/* ── FORCE SAVE BANNER ── */}
      <div style={{ background: "#065f46", borderRadius: 12, padding: "16px 20px", display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 12 }}>
        <div>
          <div style={{ color: "#fff", fontWeight: 700, fontSize: 14 }}>💾 Save Current User List to Server</div>
          <div style={{ color: "#6ee7b7", fontSize: 12, marginTop: 2 }}>After all edits/deletions — click this to permanently save on ALL devices</div>
        </div>
        <button onClick={forceSaveToServer} style={{ background: "#10b981", border: "none", borderRadius: 8, padding: "10px 20px", color: "#fff", fontWeight: 700, fontSize: 14, cursor: "pointer" }}>
          💾 Force Save to Server
        </button>
      </div>

      {/* Sync new user list from code */}
      <div style={{ background: "#1e3a5f", borderRadius: 12, padding: "16px 20px", display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 12, border: "1.5px solid rgba(59,130,246,0.4)" }}>
        <div>
          <div style={{ color: "#fff", fontWeight: 700, fontSize: 14 }}>🔄 Sync New User Database from Code</div>
          <div style={{ color: "#93c5fd", fontSize: 12, marginTop: 2 }}>Replaces Firebase with the latest {AUTHORISED_USERS.length}-user list. Assistant roles are preserved.</div>
        </div>
        {!syncConfirm
          ? <button onClick={() => setSyncConfirm(true)} style={{ background: "linear-gradient(135deg,#7c3aed,#a855f7)", border: "none", borderRadius: 8, padding: "10px 20px", color: "#fff", fontWeight: 700, fontSize: 14, cursor: "pointer" }}>
              🔄 Sync Now
            </button>
          : <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
              <span style={{ color: "#fcd34d", fontSize: 12, fontWeight: 600 }}>⚠️ This will replace all {users.length} current users. Sure?</span>
              <button onClick={syncNewUserList} style={{ background: "#ef4444", border: "none", borderRadius: 8, padding: "8px 16px", color: "#fff", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>Yes, Replace</button>
              <button onClick={() => setSyncConfirm(false)} style={{ background: "transparent", border: "1px solid #475569", borderRadius: 8, padding: "8px 16px", color: "#94a3b8", fontWeight: 600, fontSize: 13, cursor: "pointer" }}>Cancel</button>
            </div>
        }
      </div>

      <div style={css.grid4}>
        {[
          { icon: "👥", val: users.length, label: "Total Users", color: T.info },
          { icon: "🏢", val: depts.length, label: "Departments", color: T.success },
          { icon: "🔑", val: 2, label: "Admins", color: T.warning },
          { icon: "👤", val: users.length - 2, label: "Regular Users", color: T.mutedCard },
        ].map(s => (
          <div key={s.label} style={{ ...css.card, borderTop: `3px solid ${s.color}` }}>
            <div style={{ fontSize: 22, marginBottom: 4 }}>{s.icon}</div>
            <div style={{ ...css.statNum, color: s.color }}>{s.val}</div>
            <div style={css.statLabel}>{s.label}</div>
          </div>
        ))}
      </div>

      <div className="two-col" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20 }}>
        <div style={css.card}>
          <div style={css.sectionTitle}>➕ Add New User</div>
          {msg && <div style={{ padding: "10px 14px", borderRadius: 8, background: msg.startsWith("✅") ? (darkMode ? "#052e16" : "#dcfce7") : (darkMode ? "#450a0a" : "#fee2e2"), marginBottom: 14, fontSize: 13, fontWeight: 600, color: msg.startsWith("✅") ? (darkMode ? "#4ade80" : "#166534") : (darkMode ? "#fca5a5" : "#991b1b") }}>{msg}</div>}
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            <div><label style={css.label}>Full Name *</label>
              <input style={css.input} value={form.name} onChange={e => setForm(f => ({...f, name: e.target.value}))} placeholder="e.g. RAMESH KUMAR SINGH" /></div>
            <div><label style={css.label}>PF ID *</label>
              <input style={css.input} value={form.pfId} onChange={e => setForm(f => ({...f, pfId: e.target.value}))} placeholder="e.g. 3612345" maxLength={10} /></div>
            <div><label style={css.label}>Department *</label>
              <input style={css.input} value={form.department} onChange={e => setForm(f => ({...f, department: e.target.value}))} placeholder="e.g. Human Resources" list="dept-list" />
              <datalist id="dept-list">{depts.map(d => <option key={d} value={d} />)}</datalist></div>
            <button style={css.btn(T.info)} onClick={handleAdd}>➕ Add User</button>
          </div>
        </div>
        <div style={css.card}>
          <div style={css.sectionTitle}>ℹ️ Instructions</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 10, fontSize: 13, lineHeight: 1.6 }}>
            <div style={{ padding: 12, background: darkMode ? "#0c1e3c" : "#eff6ff", borderRadius: 8, border: "1px solid #bfdbfe", color: darkMode ? "#93c5fd" : "#1e40af" }}>
              <b>Adding:</b> Fill name, PF ID and department. The user can log in immediately with their PF ID.
            </div>
            <div style={{ padding: 12, background: darkMode ? "#2d1f00" : "#fef9c3", borderRadius: 8, border: "1px solid #fde68a", color: darkMode ? "#fcd34d" : "#92400e" }}>
              <b>Editing:</b> Click ✏️ to update a user's name or department. PF ID cannot be changed.
            </div>
            <div style={{ padding: 12, background: darkMode ? "#1e1035" : "#f5f3ff", borderRadius: 8, border: "1px solid #ddd6fe", color: darkMode ? "#c4b5fd" : "#5b21b6" }}>
              <b>Assistant Role:</b> Click 🤝 to promote a user to Assistant — they get access to Tracking, Charging and Maintenance tabs (but not Approvals or Users).
            </div>
            <div style={{ padding: 12, background: darkMode ? "#450a0a" : "#fef2f2", borderRadius: 8, border: "1px solid #fecaca", color: darkMode ? "#fca5a5" : "#991b1b" }}>
              <b>Deleting:</b> Click 🗑️ — a confirmation will appear. Admin accounts cannot be deleted.
            </div>
            <div style={{ padding: 12, background: darkMode ? "#052e16" : "#f0fdf4", borderRadius: 8, border: "1px solid #bbf7d0", color: darkMode ? "#4ade80" : "#166534" }}>
              <b>Note:</b> All changes sync instantly across all devices.
            </div>
          </div>
        </div>
      </div>

      <div style={css.card}>
      {/* ── DRIVER MANAGEMENT ── */}
      <div style={{ ...css.card, marginBottom: 20 }}>
        <div style={css.sectionTitle}>🧑‍✈️ Driver Details</div>
        <div style={{ fontSize: 12, color: T.mutedCard, marginBottom: 14 }}>Update driver name and contact number for any vehicle.</div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(240px, 1fr))", gap: 14 }}>
          {(cars || []).map(car => (
            <DriverEditCard key={car.id} car={car} darkMode={darkMode} onSave={updated => {
              saveCars((cars || []).map(c => c.id === updated.id ? updated : c));
              showMsg("✅ Driver updated for " + updated.name + "!");
            }} />
          ))}
        </div>
      </div>

        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14, flexWrap: "wrap", gap: 10 }}>
          <div style={css.sectionTitle}>👥 Authorised Users ({filtered.length})</div>
          <div style={{ display: "flex", gap: 10, flexWrap: "wrap", alignItems: "center" }}>
            <button onClick={forceSaveToServer} style={{ ...css.btn(T.success), padding: "8px 16px", fontSize: 12 }}>💾 Force Save to Server</button>
            <input style={{ ...css.input, maxWidth: 280 }} placeholder="Search name, PF ID or department…" value={search} onChange={e => setSearch(e.target.value)} />
          </div>
        </div>
        <div className="scroll-table"><table style={css.table}>
          <thead><tr>{["#","Name","PF ID","Department","Role","Actions"].map(h => <th key={h} style={css.th}>{h}</th>)}</tr></thead>
          <tbody>
            {filtered.map((u, i) => {
              const isAdmin = u.pfId === ADMIN_1.pfId || u.pfId === ADMIN_2.pfId;
              return (
                <tr key={u.pfId} style={{ background: isAdmin ? (darkMode ? "#0c1e3c" : "#eff6ff") : "transparent" }}>
                  <td style={{ ...css.td, color: T.mutedCard, fontSize: 11 }}>{i+1}</td>
                  <td style={css.td}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <div style={{ width: 28, height: 28, borderRadius: "50%", background: isAdmin ? T.info : "#94a3b8", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontWeight: 800, fontSize: 11, flexShrink: 0 }}>{u.name.charAt(0)}</div>
                      <div>
                        <div style={{ fontWeight: 600, fontSize: 13 }}>{u.name}</div>
                        {u.designation && <div style={{ fontSize: 10, color: T.mutedCard }}>{u.designation}</div>}
                      </div>
                    </div>
                  </td>
                  <td style={{ ...css.td, fontFamily: "monospace" }}>{u.pfId}</td>
                  <td style={{ ...css.td, fontSize: 12, color: T.mutedCard }}>{u.department}</td>
                  <td style={css.td}>{isAdmin ? <span style={css.badge(T.info)}>🔑 Admin</span> : u.isAssistant ? <span style={css.badge(T.warning)}>🤝 Assistant</span> : <span style={css.badge(T.muted)}>👤 Staff</span>}</td>
                  <td style={css.td}>
                    <div style={{ display: "flex", gap: 6 }}>
                      <button onClick={() => setEditUser({...u})} style={{ ...css.btnSm(T.info), padding: "4px 10px" }}>✏️</button>
                      <button onClick={() => setResetPwUser(u)} style={{ ...css.btnSm(T.warning), padding: "4px 10px" }} title="Reset Password">🔑</button>
                      {!isAdmin && (
                        <button onClick={async () => {
                          const updated = users.map(x => x.pfId === u.pfId ? { ...x, isAssistant: !u.isAssistant } : x);
                          saveUsers(updated);
                          showMsg(u.isAssistant ? `✅ ${u.name} is now Staff` : `✅ ${u.name} is now Assistant`);
                        }} style={{ ...css.btnSm(u.isAssistant ? T.muted : "#7c3aed"), padding: "4px 10px" }} title={u.isAssistant ? "Demote to Staff" : "Promote to Assistant"}>
                          {u.isAssistant ? "👤" : "🤝"}
                        </button>
                      )}
                      {!isAdmin && <button onClick={() => setConfirmDelete(u.pfId)} style={{ ...css.btnSm(T.danger), padding: "4px 10px" }}>🗑️</button>}
                    </div>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table></div>
      </div>

      {editUser && (
        <div style={css.modal} onClick={() => setEditUser(null)}>
          <div style={css.modalBox} onClick={e => e.stopPropagation()}>
            <div style={{ ...css.sectionTitle, marginBottom: 16 }}>✏️ Edit User</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
              <div><label style={css.label}>PF ID (cannot change)</label>
                <input style={{ ...css.input, background: darkMode ? "#1e293b" : "#f8fafc", color: T.mutedCard }} value={editUser.pfId} readOnly /></div>
              <div><label style={css.label}>Full Name *</label>
                <input style={css.input} value={editUser.name} onChange={e => setEditUser(u => ({...u, name: e.target.value}))} /></div>
              <div><label style={css.label}>Department *</label>
                <input style={css.input} value={editUser.department} onChange={e => setEditUser(u => ({...u, department: e.target.value}))} list="dept-list2" />
                <datalist id="dept-list2">{depts.map(d => <option key={d} value={d} />)}</datalist></div>
              <div style={{ display: "flex", gap: 10 }}>
                <button style={css.btn(T.success)} onClick={handleEdit}>💾 Save Changes</button>
                <button style={css.btn(T.muted, true)} onClick={() => setEditUser(null)}>Cancel</button>
              </div>
            </div>
          </div>
        </div>
      )}

      {confirmDelete && (
        <div style={css.modal} onClick={() => setConfirmDelete(null)}>
          <div style={{ ...css.modalBox, maxWidth: 400 }} onClick={e => e.stopPropagation()}>
            <div style={{ fontSize: 40, textAlign: "center", marginBottom: 12 }}>⚠️</div>
            <div style={{ ...css.sectionTitle, textAlign: "center", marginBottom: 8 }}>Confirm Deletion</div>
            {(() => {
              const u = users.find(x => x.pfId === confirmDelete);
              return u ? <div style={{ textAlign: "center", marginBottom: 20, color: T.mutedCard, fontSize: 13 }}>
                Remove <b style={{ color: T.textCard }}>{u.name}</b> (PF: {u.pfId}) from authorised users? They will no longer be able to log in.
              </div> : null;
            })()}
            <div style={{ display: "flex", gap: 10, justifyContent: "center" }}>
              <button style={css.btn(T.danger)} onClick={() => handleDelete(confirmDelete)}>🗑️ Yes, Delete</button>
              <button style={css.btn(T.muted, true)} onClick={() => setConfirmDelete(null)}>Cancel</button>
            </div>
          </div>
        </div>
      )}

      {resetPwUser && (
        <div style={css.modal} onClick={() => { setResetPwUser(null); setResetPwMsg(""); }}>
          <div style={{ ...css.modalBox, maxWidth: 400 }} onClick={e => e.stopPropagation()}>
            <div style={{ fontSize: 32, textAlign: "center", marginBottom: 6 }}>🔑</div>
            <div style={{ ...css.sectionTitle, textAlign: "center", marginBottom: 4 }}>Reset Password</div>
            <div style={{ textAlign: "center", fontSize: 13, color: T.muted, marginBottom: 20 }}>
              Reset password for <b style={{ color: T.text }}>{resetPwUser.name}</b><br/>PF ID: <span style={{ fontFamily: "monospace" }}>{resetPwUser.pfId}</span>
            </div>
            <div style={{ padding: "12px 16px", background: darkMode ? "#2d1f00" : "#fffbeb", border: "1px solid #fde68a", borderRadius: 8, marginBottom: 20, fontSize: 12, color: darkMode ? "#fcd34d" : "#92400e" }}>
              ⚠️ This will reset the user's password to their <b>PF ID</b> ({resetPwUser.pfId}). They can change it after logging in.
            </div>
            {resetPwMsg && (
              <div style={{ padding: "10px 14px", background: darkMode ? "#052e16" : "#f0fdf4", border: "1px solid #bbf7d0", borderRadius: 8, marginBottom: 16, fontSize: 13, color: T.success }}>
                {resetPwMsg}
              </div>
            )}
            <div style={{ display: "flex", gap: 10, justifyContent: "center" }}>
              <button style={css.btn(T.warning)} onClick={async () => {
                await savePassword(resetPwUser.pfId, resetPwUser.pfId);
                setResetPwMsg("✅ Password reset to PF ID successfully!");
                setTimeout(() => { setResetPwUser(null); setResetPwMsg(""); }, 1500);
              }}>🔑 Yes, Reset</button>
              <button style={css.btn(T.muted, true)} onClick={() => { setResetPwUser(null); setResetPwMsg(""); }}>Cancel</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(App));
    // Loader is hidden by React itself once data is ready (see window.__hideLoader)
    window.__hideLoader = () => {
      const el = document.getElementById("ev-loader");
      if (!el || el._hiding) return;
      el._hiding = true;
      el.style.transition = "opacity 0.55s ease";
      el.style.opacity = "0";
      setTimeout(() => { el.style.display = "none"; }, 580);
    };
  </script>
</body>
</html>
